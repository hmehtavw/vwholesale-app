async function deleteCustomerCascade(id) {
  const [visits, tasks, leads, quotes] = await Promise.all([
    VW_DB.getByIndex(VW_DB.STORES.visits, 'customerId', id),
    VW_DB.getByIndex(VW_DB.STORES.tasks, 'customerId', id),
    VW_DB.all(VW_DB.STORES.leads),
    VW_DB.all(VW_DB.STORES.quotations)
  ]);
  await Promise.all(visits.map(v => VW_DB.del(VW_DB.STORES.visits, v.id)));
  await Promise.all(tasks.map(t => VW_DB.del(VW_DB.STORES.tasks, t.id)));
  await Promise.all(leads.filter(l => l.customerId === id).map(l => VW_DB.del(VW_DB.STORES.leads, l.id)));
  await Promise.all(quotes.filter(q => q.customerId === id).map(q => VW_DB.del(VW_DB.STORES.quotations, q.id)));
  await VW_DB.del(VW_DB.STORES.customers, id);
  showToast('Customer and related records deleted', 'info');
  closeSheet();
  navigateTo('crm');
}
window.deleteCustomerCascade = deleteCustomerCascade;

  ${pendingPhotoCount ? `

function renderProductList(products, filter = 'all', search = '') {
  let list = products;
  if (filter !== 'all') list = list.filter(p => p.category === filter);
  if (search) list = list.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || (p.barcode||'').toLowerCase().includes(search.toLowerCase()));
  if (!list.length) return '<p class="empty-msg">No products found</p>';
  return list.map(p => {
    const stockColor = p.stock <= (p.lowStockThreshold || LOW_STOCK_THRESHOLD) ? 'var(--red)' : p.stock <= 50 ? 'var(--gold)' : 'var(--green)';
    const stockPct = Math.min(100, Math.round(p.stock / 200 * 100));
    return `
    <div class="inv-row" onclick="openProduct(${p.id})">
      <div class="inv-info">
        <div class="inv-name">${p.name}</div>
        <div class="inv-meta">${p.category} · Barcode: ${p.barcode || '—'} · ₹${p.price.toLocaleString('en-IN')}/${p.unit}</div>
        <div class="stock-bar-bg"><div class="stock-bar" style="width:${stockPct}%;background:${stockColor}"></div></div>
      </div>
      <div class="inv-stock" style="color:${stockColor}">${p.stock}<span class="inv-unit">${p.unit}</span></div>
    </div>`;
  }).join('');
}

async function searchInventory(val) {
  const products = await VW_DB.all(VW_DB.STORES.products);
  const af = document.querySelector('#inv-cat-filters .filter-btn.active')?.textContent || 'All';
  document.getElementById('inv-product-list').innerHTML = renderProductList(products, af === 'All' ? 'all' : af, val);
}

async function invFilterCat(cat, btn) {

}

async function updateProduct(id) {
  const p = await VW_DB.getById(VW_DB.STORES.products, id);
  const adjType = document.getElementById('adj-type').value;
  const adjVal = parseFloat(document.getElementById('adj-stock').value);
  if (adjType === 'set') p.stock = adjVal;
  else if (adjType === 'add') p.stock += adjVal;
  else if (adjType === 'sub') p.stock = Math.max(0, p.stock - adjVal);
  p.brand = document.getElementById('adj-brand').value.trim();
  p.model = document.getElementById('adj-model').value.trim();
  p.price = parseFloat(document.getElementById('adj-price').value);
  p.costPrice = parseFloat(document.getElementById('adj-cost').value) || 0;
  p.lowStockThreshold = parseFloat(document.getElementById('adj-threshold').value) || 20;
  p.barcode = document.getElementById('adj-barcode').value;
  p.hsn = document.getElementById('adj-hsn').value.trim();
  if (pendingProductPhotos) p.photos = pendingProductPhotos;
  p.updatedAt = new Date().toISOString();
  await VW_DB.put(VW_DB.STORES.products, p);
  showToast('Product updated', 'success');
  closeSheet();
  navigateTo('inventory');
}

// ===== PHOTO SUBMISSION & APPROVAL (works for existing Inventory products
// AND brand-new pending products not yet approved — same mechanism either
// way, just a different foreign key on the submission row) =====

// A person's own seniorityLevel within Inventory determines whether their
// own submission can skip the approval step — level 2+ counts as senior
// enough to self-approve; level 1 (regular staff) always needs someone
// else to review, regardless of department.
async function currentUserIsInventorySenior() {
  if (VW_AUTH.isAdmin()) return true;
  const profile = VW_AUTH.getCurrentProfile();
  if (!profile || !profile.staffId) return false;
  const staff = await VW_DB.getById(VW_DB.STORES.staff, profile.staffId);
  return !!(staff && (staff.seniorityLevel || 1) >= 2 && (staff.team === 'inventory' || staff.team === 'management' || staff.team === 'store_manager'));
}
window.currentUserIsInventorySenior = currentUserIsInventorySenior;

// Opens a simple camera/file-picker sheet that can be reached from
// anywhere (Quotations adding a new brand, Inventory, Purchase, etc.)
// productId is for an EXISTING Inventory product; pendingProductId is for
// a brand-new one still awaiting its own separate approval. Exactly one
// of the two should be provided.
function showSubmitProductPhoto(productId, pendingProductId, displayName) {
  const sheet = document.getElementById('bottom-sheet');
  sheet.innerHTML = `

    <h3>Add a Photo${displayName ? ' — '+displayName : ''}</h3>
    <p class="sheet-meta">Take a photo or choose one from your gallery. It'll be reviewed by Inventory before it shows up officially.</p>
    <input type="file" id="submit-photo-input" accept="image/*" capture="environment" onchange="handleSubmitProductPhoto(this, ${productId||'null'}, ${pendingProductId||'null'})">
    <div id="submit-photo-status" style="font-size:12px;margin-top:8px"></div>
    <button class="btn-secondary full-width" style="margin-top:10px" onclick="closeSheet();navigateTo('inventory')">Skip for now</button>
  `;
  sheet.classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
}

async function handleSubmitProductPhoto(input, productId, pendingProductId) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('submit-photo-status');

  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  if (statusEl) statusEl.textContent = 'Uploading...';
  try {
    const folderKey = productId ? `product-${productId}` : `pending-${pendingProductId}`;
    const path = await VW_DB.uploadProductPhoto(dataUrl, folderKey);
    const profile = VW_AUTH.getCurrentProfile();
    const isSenior = await currentUserIsInventorySenior();

    const photoId = await VW_DB.put(VW_DB.STORES.photoSubmissions, {
      productId: productId || null, pendingProductId: pendingProductId || null,
      storagePath: path, submittedByName: profile ? profile.name : '', submittedByStaffId: profile ? profile.staffId : null,
      status: isSenior ? 'approved' : 'pending',
      reviewedByName: isSenior ? (profile ? profile.name+' (self, senior)' : '') : null,
      reviewedAt: isSenior ? new Date().toISOString() : null,
      createdAt: new Date().toISOString()
    });

    // If approved immediately (senior self-submission), fold it straight
    // into the product's real photo gallery now rather than waiting.
    if (isSenior && productId) {
      await applyApprovedPhotoToProduct(photoId, productId, path);
    }

    if (statusEl) statusEl.innerHTML = isSenior
      ? '<span style="color:var(--green)">✓ Photo added</span>'
      : '<span style="color:var(--gold)">✓ Submitted — waiting on Inventory approval</span>';
    showToast(isSenior ? 'Photo added' : 'Photo submitted for approval', 'success');
  } catch (e) {
    console.error('Photo submission error:', e);
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">Upload failed — try again</span>';
  }
  input.value = '';
}
window.handleSubmitProductPhoto = handleSubmitProductPhoto;

async function applyApprovedPhotoToProduct(photoId, productId, path) {
  const p = await VW_DB.getById(VW_DB.STORES.products, productId);
  if (!p) return;
  const url = await VW_DB.getProductPhotoUrl(path);
  const photos = p.photos || [];
  photos.push({ path, url, tag: '' });
  p.photos = photos;
  await VW_DB.put(VW_DB.STORES.products, p);
}

// ===== Inventory's review queue for pending photo submissions =====
async function renderPendingPhotoApprovals() {
  const photos = await VW_DB.all(VW_DB.STORES.photoSubmissions);
  const pending = photos.filter(p => p.status === 'pending');
  if (!pending.length) return '<p class="empty-msg">No photos waiting on approval</p>';

  const [products, pendingProducts] = await Promise.all([
    VW_DB.all(VW_DB.STORES.products),
    VW_DB.all(VW_DB.STORES.pendingProducts)
  ]);

  const cards = await Promise.all(pending.map(async ph => {
    const url = await VW_DB.getProductPhotoUrl(ph.storagePath);
    const target = ph.productId ? products.find(p=>p.id===ph.productId) : pendingProducts.find(p=>p.id===ph.pendingProductId);
    const name = target ? (target.name || [target.brand, target.model].filter(Boolean).join(' ')) : 'Unknown product';
    return `
    <div class="product-photo-card" style="margin-bottom:10px">
      <img src="${url}" alt="">
      <div style="font-size:12px;font-weight:600">${name}</div>
      <div style="font-size:11px;color:var(--text3)">Submitted by ${ph.submittedByName||'—'}</div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button class="btn-sm" onclick="approvePendingPhoto(${ph.id})">✓ Approve</button>
        <button class="btn-sm" style="color:var(--red)" onclick="rejectPendingPhoto(${ph.id})">✕ Reject</button>
      </div>
    </div>`;
  }));
  return cards.join('');
}
window.renderPendingPhotoApprovals = renderPendingPhotoApprovals;

async function approvePendingPhoto(photoId) {
  const ph = await VW_DB.getById(VW_DB.STORES.photoSubmissions, photoId);
  if (!ph) return;
  const profile = VW_AUTH.getCurrentProfile();
  ph.status = 'approved';
  ph.reviewedByName = profile ? profile.name : '';
  ph.reviewedAt = new Date().toISOString();
  await VW_DB.put(VW_DB.STORES.photoSubmissions, ph);

  if (ph.productId) await applyApprovedPhotoToProduct(photoId, ph.productId, ph.storagePath);
  // For a pendingProductId (brand-new product not yet in Inventory), the
  // photo just stays approved-and-attached on this row; it gets carried
  // over to the real product's gallery once that pending product itself
  // is approved into Inventory (handled wherever that approval happens).

  showToast('Photo approved', 'success');
  navigateTo('inventory');
}
window.approvePendingPhoto = approvePendingPhoto;

async function rejectPendingPhoto(photoId) {
  const reason = prompt('Reason for rejecting this photo (optional):') || '';
  const ph = await VW_DB.getById(VW_DB.STORES.photoSubmissions, photoId);
  if (!ph) return;
  const profile = VW_AUTH.getCurrentProfile();
  ph.status = 'rejected';
  ph.rejectReason = reason;
  ph.reviewedByName = profile ? profile.name : '';
  ph.reviewedAt = new Date().toISOString();
  await VW_DB.put(VW_DB.STORES.photoSubmissions, ph);
  showToast('Photo rejected', 'info');
  navigateTo('inventory');
}
window.rejectPendingPhoto = rejectPendingPhoto;

    const statusLabels = { present: 'Present', absent: 'Absent', late: 'Late', leave: 'On Leave', 'not-marked': 'Not Marked' };
    return `

async function markAtt(staffId, status) {
  const today = new Date().toDateString();
  const all = await VW_DB.all(VW_DB.STORES.attendance);
  const existing = all.find(a => a.staffId === staffId && new Date(a.date).toDateString() === today);
  if (existing) { existing.status = status; existing.updatedAt = new Date().toISOString(); await VW_DB.put(VW_DB.STORES.attendance, existing); }
  else { await VW_DB.put(VW_DB.STORES.attendance, { staffId, status, date: new Date().toISOString(), createdAt: new Date().toISOString() }); }
  const staff = await VW_DB.all(VW_DB.STORES.staff);
  const attendance = await VW_DB.all(VW_DB.STORES.attendance);
  const todayAtt = attendance.filter(a => new Date(a.date).toDateString() === today);
  document.getElementById('attendance-list').innerHTML = await renderAttendanceList(staff, todayAtt);
  const presentToday = todayAtt.filter(a => a.status === 'present').length;
  showToast(`Marked`, 'success');
}

async function markAllPresent() {
  const staff = await VW_DB.all(VW_DB.STORES.staff);
  const today = new Date().toDateString();
  const all = await VW_DB.all(VW_DB.STORES.attendance);
  for (const s of staff) {
    const existing = all.find(a => a.staffId === s.id && new Date(a.date).toDateString() === today);
    if (!existing || existing.status === 'not-marked') {
      if (existing) { existing.status = 'present'; await VW_DB.put(VW_DB.STORES.attendance, existing); }
      else { await VW_DB.put(VW_DB.STORES.attendance, { staffId: s.id, status: 'present', date: new Date().toISOString(), createdAt: new Date().toISOString() }); }
    }
  }
  const att = await VW_DB.all(VW_DB.STORES.attendance);
  const todayAtt = att.filter(a => new Date(a.date).toDateString() === today);
  document.getElementById('attendance-list').innerHTML = await renderAttendanceList(staff, todayAtt);
  showToast('All staff marked present', 'success');
}

async function renderAttSummary(staff, attendance) {
  if (!staff.length) return '<p class="empty-msg">No data yet</p>';
  const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
  const monthAtt = attendance.filter(a => new Date(a.date) >= monthStart);
  const workingDays = Math.max(1, Math.ceil((new Date() - monthStart) / 86400000));

  return staff.map(s => {
    const sAtt = monthAtt.filter(a => a.staffId === s.id);
    const present = sAtt.filter(a => a.status === 'present' || a.status === 'late').length;
    const absent = sAtt.filter(a => a.status === 'absent').length;
    const onLeave = sAtt.filter(a => a.status === 'leave').length;
    const pct = Math.round(present / workingDays * 100);
    return `
    <div class="att-summary-row">
      <div class="staff-avatar" style="width:32px;height:32px;font-size:13px">${(s.name||'?')[0]}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:13px;font-weight:500">${s.name}</span>
          <span style="font-size:12px;color:var(--gold)">${pct}%</span>
        </div>
        <div class="stock-bar-bg"><div class="stock-bar" style="width:${pct}%;background:${pct>=80?'var(--green)':pct>=60?'var(--gold)':'var(--red)'}"></div></div>
        <div style="font-size:11px;color:#666;margin-top:3px">${present}P · ${absent}A · ${onLeave}L (${workingDays} days)</div>
      </div>
    </div>`;
  }).join('');
}

/* === onboarding.js === */
// ===== EMPLOYEE ONBOARDING (self-service) =====
// Stage 1: HR creates an offer (role/salary/terms), the app generates an
// offer letter PDF-ready print view, HR sets a one-time PIN, and gets a
// shareable link to send the candidate via WhatsApp.
//
// Stage 2 (separate, candidate-facing): the candidate opens the link,
// enters the PIN, reviews and accepts the offer letter, then fills in
// their full onboarding details (personal info, photo, documents, bank,
// emergency contact, education/experience, references).
//
// Stage 3: HR reviews each submission in a queue and approves it into a
// real Staff Directory entry.

const OFFER_STATUS_LABELS = {
  sent: 'Link Sent — Awaiting Response',
  accepted: 'Offer Accepted — Filling Form',
  submitted: 'Submitted — Awaiting HR Review',
  approved: 'Approved — Added to Team',
  rejected: 'Rejected'
};

async function renderOffersPipeline() {
  const offers = await VW_DB.all(VW_DB.STORES.staffOffers);
  const active = offers.filter(o => o.status !== 'approved' && o.status !== 'rejected');
  active.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  if (!active.length) return '<p class="empty-msg">No offers in progress — tap "+ New Offer" to start onboarding someone</p>';
  return active.map(o => `
    <div class="cust-row" onclick="openOfferDetail(${o.id})">
      <div class="cust-info"><div class="cust-name">${o.candidateName}</div><div class="cust-meta">${o.role} &middot; ${OFFER_STATUS_LABELS[o.status]||o.status}</div></div>
    </div>`).join('');
}
window.renderOffersPipeline = renderOffersPipeline;

function showCreateOffer() {
  const sheet = document.getElementById('bottom-sheet');
  const depts = ['Tiles','Sanitary','Plywood','Electricals','Paints','Plumbing','Appliances','HR','Purchase','Inventory','Management','Accounts'];
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <h3>New Offer</h3>
    <div class="input-row">
      <div class="form-group" style="flex:1"><label>Candidate Name *</label><input type="text" id="of-name"></div>
      <div class="form-group" style="flex:1"><label>Phone *</label><input type="tel" id="of-phone" maxlength="10"></div>
    </div>
    <div class="input-row">
      <div class="form-group" style="flex:1"><label>Role *</label><input type="text" id="of-role" placeholder="e.g. Sales Executive"></div>
      <div class="form-group" style="flex:1"><label>Department</label>
        <select id="of-dept">${depts.map(d=>`<option>${d}</option>`).join('')}</select></div>
    </div>
    <div class="input-row">
      <div class="form-group" style="flex:1"><label>Monthly Salary (₹) *</label><input type="number" id="of-salary"></div>
      <div class="form-group" style="flex:1"><label>Start Date *</label><input type="date" id="of-startdate"></div>
    </div>
    <div class="input-row">
      <div class="form-group" style="flex:1"><label>Probation (months)</label><input type="number" id="of-probation" value="3"></div>
      <div class="form-group" style="flex:1"><label>Reporting Manager</label><input type="text" id="of-manager"></div>
    </div>
    <div class="form-group"><label>Additional Clauses / Terms (optional)</label>
      <textarea id="of-clauses" rows="3" placeholder="Any specific terms for this offer"></textarea>
    </div>
    <button class="btn-primary full-width" style="margin-top:8px" onclick="createOffer()">Generate Offer &amp; Continue</button>
  `;
  sheet.classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
}
window.showCreateOffer = showCreateOffer;

function generateOfferPin() {
  // A short, easy-to-read-aloud-or-type PIN — not a security-grade
  // secret, just enough to confirm the right person opened the link.
  return Math.floor(1000 + Math.random() * 9000).toString();
}

async function createOffer() {
  const name = document.getElementById('of-name').value.trim();
  const phone = document.getElementById('of-phone').value.trim();
  const role = document.getElementById('of-role').value.trim();
  const salary = parseFloat(document.getElementById('of-salary').value);
  const startDate = document.getElementById('of-startdate').value;
  if (!name || !phone || !role || !salary || !startDate) return showToast('Fill all required fields', 'warn');

  const profile = VW_AUTH.getCurrentProfile();
  const offer = {
    candidateName: name, candidatePhone: phone, role,
    department: document.getElementById('of-dept').value,
    salary, startDate,
    probationMonths: parseFloat(document.getElementById('of-probation').value) || 3,
    reportingManager: document.getElementById('of-manager').value.trim(),
    customClauses: document.getElementById('of-clauses').value.trim(),
    pin: generateOfferPin(),
    status: 'sent',
    createdByName: profile ? profile.name : '',
    createdAt: new Date().toISOString()
  };
  const id = await VW_DB.put(VW_DB.STORES.staffOffers, offer);
  offer.id = id;
  showOfferReadyToShare(offer);
}
window.createOffer = createOffer;

function showOfferReadyToShare(offer) {

async function shareOfferViaWhatsApp(offerId) {
  const offer = await VW_DB.getById(VW_DB.STORES.staffOffers, offerId);
  const link = `${window.location.origin}${window.location.pathname}?onboard=${offer.id}`;
  const msg = `Hi ${offer.candidateName}! 🎉 Welcome to V Wholesale.\n\nPlease complete your onboarding here:\n${link}\n\nYour access PIN: *${offer.pin}*\n\n(Keep this PIN private — it confirms it's really you completing the form.)`;
  const phone = (offer.candidatePhone||'').replace(/\D/g,'');
  window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}
window.shareOfferViaWhatsApp = shareOfferViaWhatsApp;

async function openOfferDetail(offerId) {
  const offer = await VW_DB.getById(VW_DB.STORES.staffOffers, offerId);
  if (!offer) return;
  const link = `${window.location.origin}${window.location.pathname}?onboard=${offer.id}`;

    ${offer.status === 'rejected' && offer.rejectReason ? `<p style="font-size:12px;color:var(--text3);margin-top:8px">Rejected by ${offer.reviewedByName||''}: ${offer.rejectReason}</p>` : ''}

  sheet.classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
}
window.openOfferDetail = openOfferDetail;

// ===== CANDIDATE-FACING FLOW (no login — standalone) =====
// State lives in a single object since this is a multi-step flow outside
// the normal app navigation system.
let candidateState = { offer: null, step: 'pin', formData: {}, extraDocs: [] };

function hideAppShellForCandidate() {
  const header = document.getElementById('app-header');
  const nav = document.getElementById('bottom-nav');
  if (header) header.style.display = 'none';
  if (nav) nav.style.display = 'none';
}

async function renderCandidateEntry(offerId) {
  hideAppShellForCandidate();
  const content = document.getElementById('app-content');
  const offer = await VW_DB.getById(VW_DB.STORES.staffOffers, parseInt(offerId));

  if (!offer) {
    content.innerHTML = candidateWrapper(`<p style="text-align:center;color:var(--text3)">This link is no longer valid. Please contact HR for a new one.</p>`);
    return;
  }
  candidateState.offer = offer;

  if (offer.status === 'submitted' || offer.status === 'approved') {
    content.innerHTML = candidateWrapper(`
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:40px;margin-bottom:12px">✅</div>
        <h2 style="margin:0 0 8px">Already Submitted</h2>
        <p style="color:var(--text3);font-size:14px">Thanks ${offer.candidateName}, your details have already been submitted. HR will be in touch soon.</p>
      </div>`);
    return;
  }
  if (offer.status === 'rejected') {
    content.innerHTML = candidateWrapper(`<p style="text-align:center;color:var(--text3)">This offer is no longer active. Please contact HR.</p>`);
    return;
  }

  candidateState.step = 'pin';
  renderCandidatePinScreen();
}

/* === excel_import.js === */
// ===== EXCEL IMPORT (HR & Inventory) =====
// Shared logic: read an uploaded .xlsx/.csv, match its columns to known
// fields by header text (case/spacing-insensitive, with common aliases),
// route anything unrecognized into a flexible "customFields" object
// instead of silently dropping it or inventing a real database column,
// show a preview of what will be added/updated, then commit on confirm.

const IMPORT_FIELD_MAPS = {
  staff: {
    requiredKey: 'phone', // used to match existing records for update-vs-create
    fields: {
      name: ['name', 'employee name', 'full name', 'staff name'],
      phone: ['phone', 'mobile', 'mobile number', 'contact number', 'phone number'],
      role: ['role', 'designation', 'position'],
      department: ['department', 'dept'],
      team: ['team', 'team type'],
      salary: ['salary', 'monthly salary', 'pay', 'ctc'],
      joinDate: ['join date', 'joining date', 'date of joining', 'doj'],
      dob: ['dob', 'date of birth'],
      gender: ['gender', 'sex'],
      address: ['address', 'current address'],
      personalEmail: ['email', 'personal email', 'email address'],
      aadhaarNumber: ['aadhaar', 'aadhaar number', 'aadhar', 'aadhar number'],
      panNumber: ['pan', 'pan number'],
      bankAccountName: ['bank account name', 'account holder name'],
      bankAccountNumber: ['bank account number', 'account number'],
      bankIfsc: ['ifsc', 'ifsc code'],
      emergencyContactName: ['emergency contact name', 'emergency contact'],
      emergencyContactPhone: ['emergency contact phone', 'emergency phone'],
      education: ['education', 'qualification'],
      experience: ['experience', 'work experience']
    }
  },
  products: {
    requiredKey: 'barcode',
    fields: {
      name: ['name', 'product name', 'item name'],
      brand: ['brand'],
      model: ['model'],
      category: ['category', 'department'],
      price: ['price', 'mrp', 'selling price'],
      costPrice: ['cost price', 'cost', 'purchase price'],
      stock: ['stock', 'quantity', 'qty'],
      unit: ['unit', 'uom'],
      gst: ['gst', 'gst %', 'gst percent', 'tax'],
      barcode: ['barcode', 'sku', 'item code'],
      hsn: ['hsn', 'hsn code', 'hsn/sac', 'sac']
    }
  }
};

function normalizeHeader(h) {
  return String(h||'').toLowerCase().trim().replace(/\s+/g,' ');
}

function matchColumnsToFields(headers, entityType) {
  const map = IMPORT_FIELD_MAPS[entityType];
  const matched = {};   // header -> fieldKey
  const unmatched = []; // headers with no field match

  headers.forEach(h => {
    const norm = normalizeHeader(h);
    let foundField = null;
    for (const [fieldKey, aliases] of Object.entries(map.fields)) {
      if (aliases.includes(norm)) { foundField = fieldKey; break; }
    }
    if (foundField) matched[h] = foundField;
    else unmatched.push(h);
  });

  return { matched, unmatched };
}

let importState = { entityType: null, rows: [], headers: [], matched: {}, unmatched: [], newFieldLabels: {} };

function triggerExcelImport(entityType) {
  importState = { entityType, rows: [], headers: [], matched: {}, unmatched: [], newFieldLabels: {} };
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls,.csv';
  input.onchange = (e) => handleExcelFileSelected(e.target.files[0]);
  input.click();
}
window.triggerExcelImport = triggerExcelImport;

function handleExcelFileSelected(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
      if (!rows.length) return showToast('That file has no data rows', 'warn');

      const headers = Object.keys(rows[0]);
      const { matched, unmatched } = matchColumnsToFields(headers, importState.entityType);
      importState.rows = rows;
      importState.headers = headers;
      importState.matched = matched;
      importState.unmatched = unmatched;

      showImportPreview();
    } catch (err) {
      console.error('Excel parse error:', err);
      showToast('Could not read that file — make sure it\'s a valid Excel/CSV', 'warn');
    }
  };
  reader.readAsArrayBuffer(file);
}

function showImportPreview() {
  const { rows, matched, unmatched, entityType } = importState;
  const entityLabel = entityType === 'staff' ? 'staff' : 'products';

  const sheet = document.getElementById('bottom-sheet');
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <h3>Import Preview</h3>
    <p class="sheet-meta">${rows.length} row(s) found in the file.</p>

    <div class="req-item-card" style="margin:10px 0">
      <div style="font-weight:600;font-size:13px;margin-bottom:6px">Matched Columns</div>
      ${Object.entries(matched).map(([h,f]) => `<div style="font-size:12px;padding:2px 0">"${h}" &rarr; ${f}</div>`).join('') || '<div style="font-size:12px;color:var(--text3)">None matched</div>'}
    </div>

    ${unmatched.length ? `
    <div class="req-item-card" style="margin:10px 0;border-color:var(--gold)">
      <div style="font-weight:600;font-size:13px;margin-bottom:6px;color:var(--gold)">⚠️ New Columns Found</div>
      <p style="font-size:12px;color:var(--text3);margin-bottom:8px">These don't match any existing field. They'll be saved as custom fields on each ${entityLabel === 'staff' ? 'staff' : 'product'} record (visible and editable) — they will NOT become permanent database columns unless you ask for that later.</p>
      ${unmatched.map((h,i) => `<div style="font-size:12px;padding:3px 0">"${h}" &mdash; save as: <input type="text" value="${h}" style="width:140px;display:inline-block" id="newfield-${i}"></div>`).join('')}
    </div>` : ''}

    <div style="max-height:200px;overflow-y:auto;border:1px solid var(--border2);border-radius:8px;margin:10px 0">
      ${rows.slice(0,5).map(r => `<div style="font-size:11px;padding:6px 10px;border-bottom:1px solid var(--border2)">${Object.values(r).join(' · ')}</div>`).join('')}
      ${rows.length > 5 ? `<div style="font-size:11px;padding:6px 10px;color:var(--text3)">...and ${rows.length-5} more</div>` : ''}
    </div>

    <button class="btn-primary full-width" onclick="confirmExcelImport()">Import ${rows.length} Row(s)</button>
    <button class="btn-secondary full-width" style="margin-top:8px" onclick="closeSheet()">Cancel</button>
  `;
  sheet.classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
}

async function confirmExcelImport() {
  const { rows, matched, unmatched, entityType } = importState;
  const map = IMPORT_FIELD_MAPS[entityType];
  const store = entityType === 'staff' ? VW_DB.STORES.staff : VW_DB.STORES.products;

  unmatched.forEach((h,i) => {
    const input = document.getElementById(`newfield-${i}`);
    importState.newFieldLabels[h] = input ? input.value.trim() || h : h;
  });

  const existing = await VW_DB.all(store);
  const existingByKey = {};
  existing.forEach(r => { if (r[map.requiredKey]) existingByKey[String(r[map.requiredKey]).trim()] = r; });

  let added = 0, updated = 0;
  for (const row of rows) {
    const record = { customFields: {} };
    for (const [header, fieldKey] of Object.entries(matched)) {
      let val = row[header];
      if (['salary','price','costPrice','stock','gst'].includes(fieldKey)) val = parseFloat(val) || 0;
      record[fieldKey] = val;
    }
    for (const header of unmatched) {
      const label = importState.newFieldLabels[header] || header;
      if (row[header] !== '') record.customFields[label] = row[header];
    }

    const keyVal = record[map.requiredKey] ? String(record[map.requiredKey]).trim() : null;
    const existingRecord = keyVal ? existingByKey[keyVal] : null;

    if (existingRecord) {
      Object.assign(existingRecord, record, { customFields: { ...(existingRecord.customFields||{}), ...record.customFields } });
      await VW_DB.put(store, existingRecord);
      updated++;
    } else {
      if (entityType === 'staff') { record.team = record.team || 'specialist'; }
      else { record.stock = record.stock || 0; record.unit = record.unit || 'pc'; record.gst = record.gst || 18; }
      record.createdAt = new Date().toISOString();
      await VW_DB.put(store, record);
      added++;
    }
  }

  showToast(`Import complete: ${added} added, ${updated} updated`, 'success');
  closeSheet();
  navigateTo(entityType === 'staff' ? 'hr' : 'inventory');
}
window.confirmExcelImport = confirmExcelImport;

async function renderMyTasks() {

  let myTasks = [];
  if (profile && profile.role === 'staff' && profile.staffId) {

  } else if (profile && profile.role === 'admin') {
    myTasks = allTasks;
  } else {
    myTasks = [];
  }

  const pending = myTasks.filter(t => t.status === 'pending');
  const active = myTasks.filter(t => ['accepted','in_progress','quoted','negotiating'].includes(t.status) || (t.stage && !['Won','Lost'].includes(t.stage) && t.status !== 'pending'));
  const done = myTasks.filter(t => t.stage === 'Won' || t.stage === 'Lost');

  return `
  <div class="module-header">
    <h2>My Tasks</h2>
    <div class="stat-row">
      <div class="stat"><span class="stat-num" style="color:var(--gold)">${pending.length}</span><span class="stat-label">New</span></div>
      <div class="stat"><span class="stat-num">${active.length}</span><span class="stat-label">Active</span></div>
      <div class="stat"><span class="stat-num" style="color:var(--green)">${done.filter(t=>t.stage==='Won').length}</span><span class="stat-label">Won</span></div>
    </div>
  </div>

  <div class="alert-card">
    <div class="alert-title">&#9888;&#65039; Account not linked to a team member yet</div>
    <p style="font-size:13px;color:var(--text2)">Management needs to link your account to a staff record before tasks can be routed to you.</p>
  </div>` : ''}

  ${pending.length ? `
  <div class="alert-card">
    <div class="alert-title">🔔 New Tasks Awaiting Response</div>
    ${pending.map(t => renderTaskRow(t, true)).join('')}
  </div>` : ''}

  <div class="card">
    <h3 class="card-title">Active Tasks (${active.length})</h3>
    ${active.length ? active.map(t => renderTaskRow(t, false)).join('') : '<p class="empty-msg">No active tasks</p>'}

function renderTaskRow(t, showAccept) {
  const stageColor = STAGE_COLORS[t.stage] || '#888';
  return `
  <div class="task-card" onclick="openTaskDetail(${t.id})">
    <div class="task-card-header">
      <span class="task-dept">${t.customerName || 'Customer'} · ${t.department}</span>
      <span class="task-stage" style="color:${stageColor}">${t.stage||'Lead'}</span>
    </div>

    <div class="task-meta">${t.qty?t.qty+' · ':''}${t.budget?'₹'+Number(t.budget).toLocaleString('en-IN'):''}</div>
    ${showAccept ? `<button class="btn-primary full-width" style="margin-top:8px" onclick="event.stopPropagation();acceptTask(${t.id})">✓ Accept Task</button>` : ''}
  </div>`;
}

async function acceptTask(taskId) {
  const task = await VW_DB.getById(VW_DB.STORES.tasks, taskId);
  const log = task.escalationLog || [];
  const last = log[log.length-1];
  if (last) { last.status = 'accepted'; last.respondedAt = new Date().toISOString(); }
  task.status = 'accepted';
  await VW_DB.put(VW_DB.STORES.tasks, task);
  showToast('Task accepted', 'success');
  navigateTo('tasks');
}

async function saveTaskDetail(taskId) {
  const task = await VW_DB.getById(VW_DB.STORES.tasks, taskId);
  const subcatEl = document.getElementById('task-subcategory');
  if (subcatEl) task.subcategory = subcatEl.value || null;
  task.description = document.getElementById('task-desc').value;
  task.qty = document.getElementById('task-qty').value;
  task.budget = document.getElementById('task-budget').value;
  task.stage = document.getElementById('task-stage').value;
  task.outcome = document.getElementById('task-outcome').value;
  task.followUpDate = document.getElementById('task-followup').value;
  if (['Won','Lost'].includes(task.stage)) task.status = 'completed';
  else if (task.status === 'pending') task.status = 'accepted';
  task.updatedAt = new Date().toISOString();
  await VW_DB.put(VW_DB.STORES.tasks, task);

  // sync linked lead
  const leads = await VW_DB.all(VW_DB.STORES.leads);
  const lead = leads.find(l => l.taskId === taskId);
  if (lead) {
    lead.stage = task.stage;
    lead.value = task.budget;
    lead.notes = task.description;
    lead.followUpDate = task.followUpDate;
    await VW_DB.put(VW_DB.STORES.leads, lead);
  }

  showToast('Task updated', 'success');
  closeSheet();
  navigateTo(currentPage === 'tasks' ? 'tasks' : currentPage);
}

async function confirmDeleteTask(taskId) {
  if (!confirm('Delete this task permanently? This cannot be undone.')) return;
  await VW_DB.del(VW_DB.STORES.tasks, taskId);
  showToast('Task deleted', 'info');
  closeSheet();
  navigateTo(currentPage === 'tasks' ? 'tasks' : currentPage);
}
window.confirmDeleteTask = confirmDeleteTask;

window.acceptTask = acceptTask;
window.openTaskDetail = openTaskDetail;
window.saveTaskDetail = saveTaskDetail;

function renderPermissionCheckboxes(userId, role, checkedPerms = null) {
  const defaults = checkedPerms || Object.keys(VW_AUTH.PERMISSION_PAGES).filter(perm =>
    VW_AUTH.PERMISSION_PAGES[perm].every(page => (ROLE_PAGES_FOR_DEFAULTS[role] || []).includes(page))
  );
  return `<div class="perm-checklist" id="permlist-${userId}">
    ${Object.entries(VW_AUTH.PERMISSION_LABELS).map(([key, label]) => `
      <label class="route-check-row">
        <input type="checkbox" value="${key}" ${defaults.includes(key) ? 'checked' : ''}>
        <span>${label}</span>
      </label>`).join('')}
  </div>`;
}
// Mirrors auth.js's ROLE_PAGES, used only to compute sensible default
// checkboxes when approving someone — the actual gating logic lives in auth.js.
const ROLE_PAGES_FOR_DEFAULTS = {
  admin: ['dashboard','checkin','cart','tasks','crm','inventory','hr','analytics','club','feedback','settings'],
  executive: ['dashboard','checkin','cart','tasks','feedback'],
  staff: ['dashboard','checkin','tasks','feedback'],
  reception: ['dashboard','checkin','cart','tasks','feedback']
};

function renderLinkPicker(userId, role, staff, execs) {
  if (role === 'executive') {
    return `<div class="form-group"><label>Link to Executive Slot</label>
      <select id="link-select-${userId}">
        <option value="">— Not linked (notifications won't route) —</option>
        ${execs.map(e=>`<option value="executives:${e.id}">${e.name} (${e.phone||'no phone set'})</option>`).join('')}
      </select></div>`;
  } else if (role === 'staff') {
    return `<div class="form-group"><label>Link to Team Member</label>
      <select id="link-select-${userId}">
        <option value="">— Not linked (notifications won't route) —</option>
        ${staff.map(s=>`<option value="staff:${s.id}">${s.name} (${s.department} &middot; ${s.team||'—'})</option>`).join('')}

}

async function approveUser(userId) {
  const role = document.getElementById(`role-${userId}`).value;
  const linkSelect = document.getElementById(`link-select-${userId}`);
  const linkVal = linkSelect ? linkSelect.value : '';
  const profile = await VW_DB.getById(VW_DB.STORES.profiles, userId);

  const permsContainer = document.getElementById(`permlist-${userId}`);
  const permissions = permsContainer
    ? [...permsContainer.querySelectorAll('input[type="checkbox"]:checked')].map(cb => cb.value)
    : [];
  const qdeptCheckbox = document.getElementById(`qdept-${userId}`);
  const isQuotationDept = qdeptCheckbox ? qdeptCheckbox.checked : false;

  // Include existing required fields explicitly — upsert() does not merge
  // unspecified columns with what's already in the row, it can null them out.
  const update = {
    id: userId, phone: profile.phone, name: profile.name,
    role, status: 'approved', approvedAt: new Date().toISOString(), permissions, isQuotationDept
  };

  if (linkVal) {
    const [ref, id] = linkVal.split(':');
    update.staffRef = ref;
    update.staffId = parseInt(id);
    const targetStore = ref === 'executives' ? VW_DB.STORES.executives : VW_DB.STORES.staff;
    const record = await VW_DB.getById(targetStore, parseInt(id));
    if (record) {
      update.team = record.team || null;
      update.department = record.department || null;
      // Claiming this slot means it's now this person — update the actual
      // executive/staff record's name and phone to match, so it shows
      // correctly everywhere else (Store Executives list, routing, etc.)
      record.name = profile.name;
      record.phone = profile.phone;
      await VW_DB.put(targetStore, record);
    }
  }

  await VW_DB.put(VW_DB.STORES.profiles, update);
  showToast(`${profile.name} approved as ${ROLE_LABELS[role]}`, 'success');
  navigateTo('settings');
}

}

async function saveUserAccess(userId) {
  const profile = await VW_DB.getById(VW_DB.STORES.profiles, userId);
  const role = document.getElementById(`edit-role-${userId}`).value;
  const linkSelect = document.getElementById(`link-select-${userId}`);
  const linkVal = linkSelect ? linkSelect.value : '';
  const permsContainer = document.getElementById(`permlist-${userId}`);
  const permissions = permsContainer
    ? [...permsContainer.querySelectorAll('input[type="checkbox"]:checked')].map(cb => cb.value)
    : [];
  const qdeptCheckbox = document.getElementById(`qdept-${userId}`);
  const isQuotationDept = qdeptCheckbox ? qdeptCheckbox.checked : false;

  const update = { id: userId, phone: profile.phone, name: profile.name, role, status: 'approved', permissions, isQuotationDept };

  if (linkVal) {
    const [ref, id] = linkVal.split(':');
    update.staffRef = ref;
    update.staffId = parseInt(id);
    const targetStore = ref === 'executives' ? VW_DB.STORES.executives : VW_DB.STORES.staff;
    const record = await VW_DB.getById(targetStore, parseInt(id));
    if (record) {
      update.team = record.team || null;
      update.department = record.department || null;
      record.name = profile.name;
      record.phone = profile.phone;
      await VW_DB.put(targetStore, record);
    }
  } else {
    update.staffRef = null;
    update.staffId = null;
  }

window.saveUserAccess = saveUserAccess;

async function revokeAccess(userId) {
  const profile = await VW_DB.getById(VW_DB.STORES.profiles, userId);
  if (!confirm(`Revoke ${profile.name}'s access and free up their phone number (${profile.phone}) so it can be used to sign up again?`)) return;

  try {
    const { data: sessionData } = await sb.auth.getSession();
    const token = sessionData?.session?.access_token;
    const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-user`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ userId })
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Could not revoke access');
    showToast(`Access revoked — ${profile.phone} can sign up again`, 'success');
  } catch (e) {
    console.error('revokeAccess error:', e);
    // Fall back to just marking the profile rejected if the Edge Function
    // isn't deployed yet — phone number stays blocked, but access is cut.
    await VW_DB.put(VW_DB.STORES.profiles, { id: userId, phone: profile.phone, name: profile.name, status: 'rejected', role: 'pending' });
    showToast('Access revoked (phone reuse needs the delete-user function deployed)', 'warn');
  }
  navigateTo('settings');
}

async function resolvePinReset(id) {
  const req = await VW_DB.getById(VW_DB.STORES.pinResetRequests, id);
  const newPin = document.getElementById(`newpin-${id}`).value.trim();
  if (newPin.length !== 6 || !/^\d{6}$/.test(newPin)) return showToast('Enter a 6-digit PIN', 'warn');
  if (!req.profileId) return showToast('No linked account found for this request', 'warn');

  try {
    const { data: sessionData } = await sb.auth.getSession();
    const token = sessionData?.session?.access_token;
    const res = await fetch(`${SUPABASE_URL}/functions/v1/reset-pin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ userId: req.profileId, newPin })
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Could not reset PIN');

    const profile = VW_AUTH.getCurrentProfile();
    req.status = 'resolved';
    req.resolvedByName = profile ? profile.name : '';
    req.resolvedAt = new Date().toISOString();
    await VW_DB.put(VW_DB.STORES.pinResetRequests, req);

    showToast(`New PIN set for ${req.name} — share it with them directly`, 'success');
    navigateTo('settings');
  } catch (e) {
    showToast(e.message || 'Could not reset PIN (is the reset-pin function deployed?)', 'warn');
  }
}
window.resolvePinReset = resolvePinReset;

let categoriesDraft = null;

function renderCategoriesEditor(categories) {
  if (!categoriesDraft) categoriesDraft = JSON.parse(JSON.stringify(categories || {}));
  const entries = Object.entries(categoriesDraft);
  if (!entries.length) return '<p class="empty-msg">No categories yet — tap "+ Add Category"</p>';
  return entries.map(([dept, subs], i) => `
    <div class="req-item-card">
      <div class="req-item-header">
        <input type="text" value="${dept.replace(/"/g,'&quot;')}" onchange="renameCategory(${i},this.value)" style="background:transparent;border:none;color:var(--text);font-size:14px;font-weight:600;padding:0;width:65%">
        <button class="remove-btn" onclick="removeCategory(${i})" title="Remove category">&#10005;</button>
      </div>
      <div class="cat-subchips">
        ${subs.map((s,j)=>`<span class="subcat-chip">${s}<button onclick="removeSubcategory(${i},${j})">&times;</button></span>`).join('') || '<span style="font-size:12px;color:var(--text3)">No sub-categories yet</span>'}
      </div>
      <div class="input-row" style="margin-top:8px">
        <input type="text" id="newsub-${i}" placeholder="Add sub-category" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();addSubcategory(${i})}">
        <button class="btn-sm" onclick="addSubcategory(${i})">+ Add</button>
      </div>
    </div>`).join('');
}

function refreshCategoriesEditor() {
  document.getElementById('categories-editor').innerHTML = renderCategoriesEditor();
}

function addCategory() {
  if (!categoriesDraft) categoriesDraft = {};
  let name = 'New Category', n = 1;
  while (categoriesDraft[name] !== undefined) { n++; name = `New Category ${n}`; }
  categoriesDraft[name] = [];
  refreshCategoriesEditor();
}

function renameCategory(i, newName) {
  newName = newName.trim();
  if (!newName) return refreshCategoriesEditor();
  const entries = Object.entries(categoriesDraft);
  if (entries.some(([d],idx) => d === newName && idx !== i)) {
    showToast('A category with that name already exists', 'warn');
    return refreshCategoriesEditor();
  }
  entries[i][0] = newName;
  categoriesDraft = Object.fromEntries(entries);
  refreshCategoriesEditor();
}

function removeCategory(i) {
  const entries = Object.entries(categoriesDraft);
  entries.splice(i, 1);
  categoriesDraft = Object.fromEntries(entries);
  refreshCategoriesEditor();
}

function addSubcategory(i) {
  const entries = Object.entries(categoriesDraft);
  const input = document.getElementById(`newsub-${i}`);
  const val = (input.value || '').trim();
  if (!val) return;
  if (entries[i][1].includes(val)) { showToast('Already in the list', 'warn'); return; }
  entries[i][1].push(val);
  categoriesDraft = Object.fromEntries(entries);
  refreshCategoriesEditor();
}

function removeSubcategory(i, j) {
  const entries = Object.entries(categoriesDraft);
  entries[i][1].splice(j, 1);
  categoriesDraft = Object.fromEntries(entries);
  refreshCategoriesEditor();
}

async function saveCategories() {
  if (!categoriesDraft || !Object.keys(categoriesDraft).length) {
    return showToast('Add at least one category first', 'warn');
  }
  await VW_DB.setSetting('categories', categoriesDraft);
  VW_CHECKIN.setCategoriesCache(JSON.parse(JSON.stringify(categoriesDraft)));
  showToast('Categories saved', 'success');
}

async function confirmBulkCleanup() {
  const from = document.getElementById('cleanup-from').value;
  const to = document.getElementById('cleanup-to').value;
  if (!from || !to) return showToast('Pick both a from and to date', 'warn');
  if (!confirm(`Permanently delete all customers, visits, tasks, leads, and quotations created between ${from} and ${to}? Inventory products and the brand/model catalog are never touched by this. This cannot be undone.`)) return;

  const fromTime = new Date(from).getTime();
  const toTime = new Date(to).getTime() + 86400000; // include the whole "to" day

  const [customers, visits, tasks, leads, quotes] = await Promise.all([
    VW_DB.all(VW_DB.STORES.customers), VW_DB.all(VW_DB.STORES.visits),
    VW_DB.all(VW_DB.STORES.tasks), VW_DB.all(VW_DB.STORES.leads), VW_DB.all(VW_DB.STORES.quotations)
  ]);
  const inRange = (dateStr) => { const t = new Date(dateStr).getTime(); return t >= fromTime && t < toTime; };

  let count = 0;
  for (const v of visits) if (inRange(v.date)) { await VW_DB.del(VW_DB.STORES.visits, v.id); count++; }
  for (const t of tasks) if (inRange(t.createdAt)) { await VW_DB.del(VW_DB.STORES.tasks, t.id); count++; }
  for (const l of leads) if (inRange(l.createdAt)) { await VW_DB.del(VW_DB.STORES.leads, l.id); count++; }
  for (const q of quotes) if (inRange(q.createdAt)) { await VW_DB.del(VW_DB.STORES.quotations, q.id); count++; }
  for (const c of customers) if (inRange(c.createdAt)) { await VW_DB.del(VW_DB.STORES.customers, c.id); count++; }

  showToast(`Deleted ${count} record(s) in that date range`, 'success');
  navigateTo('settings');
}

// ===================== HELPERS =====================
function isSameDay(d1, d2) { return new Date(d1).toDateString() === new Date(d2).toDateString(); }

function avgResponseMinutes(entries) {
  const times = entries.filter(e => e.respondedAt).map(e => (new Date(e.respondedAt) - new Date(e.notifiedAt)) / 60000);
  if (!times.length) return null;
  return (times.reduce((a,b)=>a+b,0) / times.length).toFixed(1);
}

function countEscalated(items, levelField) {
  return items.filter(it => (it.escalationLog||[]).length > 1).length;
}

// ===================== TODAY'S OPERATIONS REPORT =====================
async function buildOpsReport(daysBack = 0) {
  const visits = await VW_DB.all(VW_DB.STORES.visits);
  const tasks = await VW_DB.all(VW_DB.STORES.tasks);
  const invoices = await VW_DB.all(VW_DB.STORES.invoices);

  const targetDate = new Date(); targetDate.setDate(targetDate.getDate() - daysBack);
  const dayVisits = visits.filter(v => isSameDay(v.date, targetDate));
  const dayTasks = tasks.filter(t => isSameDay(t.createdAt, targetDate));
  const dayInvoices = invoices.filter(i => isSameDay(i.date, targetDate));

  const customerVisits = dayVisits.filter(v => v.visitorType === 'customer');
  const visitorEntries = dayVisits.filter(v => v.visitorType !== 'customer');

  const visitorByType = {};
  VISITOR_TYPES.forEach(vt => visitorByType[vt.key] = visitorEntries.filter(v=>v.visitorType===vt.key).length);

  const taskByDept = {};
  const deptNames = await VW_CHECKIN.getDepartmentNames();
  deptNames.forEach(d => taskByDept[d] = { total: 0, won: 0, lost: 0, active: 0 });
  dayTasks.forEach(t => {
    if (!taskByDept[t.department]) taskByDept[t.department] = { total: 0, won: 0, lost: 0, active: 0 };
    taskByDept[t.department].total++;
    if (t.stage === 'Won') taskByDept[t.department].won++;
    else if (t.stage === 'Lost') taskByDept[t.department].lost++;
    else taskByDept[t.department].active++;
  });

  const visitEscalations = customerVisits.filter(v => (v.escalationLog||[]).length > 1).length;
  const taskEscalations = dayTasks.filter(t => (t.escalationLog||[]).length > 1).length;

  const allVisitExecEntries = customerVisits.flatMap(v => (v.escalationLog||[]).filter(l=>l.level==='executive'));
  const avgVisitResponse = avgResponseMinutes(allVisitExecEntries);

  const allTaskEntries = dayTasks.flatMap(t => t.escalationLog||[]);
  const avgTaskResponse = avgResponseMinutes(allTaskEntries);

  const revenue = dayInvoices.reduce((s,i)=>s+(i.total||0), 0);
  const urgentCount = dayVisits.filter(v => (v.escalationLog||[]).some(l=>l.level==='management')).length;

  return {
    date: targetDate, customerVisits, visitorEntries, visitorByType, taskByDept,
    visitEscalations, taskEscalations, avgVisitResponse, avgTaskResponse, revenue, urgentCount,
    dayTasks
  };
}

async function renderStaffPerformance() {
  const execs = await VW_DB.all(VW_DB.STORES.executives);
  const staff = await VW_DB.all(VW_DB.STORES.staff);
  const visits = await VW_DB.all(VW_DB.STORES.visits);
  const tasks = await VW_DB.all(VW_DB.STORES.tasks);

  execs.sort((a,b)=>a.order-b.order);

  const execRows = execs.map(e => {
    const entries = visits.flatMap(v => (v.escalationLog||[]).filter(l => l.level==='executive' && l.staffId === e.id));
    const accepted = entries.filter(en=>en.status==='accepted').length;
    const timedOut = entries.filter(en=>en.status==='timeout').length;
    const avgResp = avgResponseMinutes(entries);
    return { name: e.name, assigned: entries.length, accepted, timedOut, avgResp, status: e.status };
  });

  const specialistRows = staff.filter(s => ['specialist','TL'].includes(s.team)).map(s => {
    const myTasks = tasks.filter(t => (t.escalationLog||[]).some(l=>l.staffId===s.id) || t.assignedTo===s.id);
    const won = myTasks.filter(t=>t.stage==='Won').length;
    const lost = myTasks.filter(t=>t.stage==='Lost').length;
    const active = myTasks.filter(t=>!['Won','Lost'].includes(t.stage)).length;
    const conv = (won+lost) ? Math.round(won/(won+lost)*100) : null;
    const entries = myTasks.flatMap(t => (t.escalationLog||[]).filter(l=>l.staffId===s.id));
    const avgResp = avgResponseMinutes(entries);
    return { name: s.name, dept: s.department, team: s.team, assigned: myTasks.length, won, lost, active, conv, avgResp };
  });

  return `
  <div class="card">
    <h3 class="card-title">Store Executives</h3>
    ${execRows.length ? execRows.map(r => `
      <div class="cust-row" style="cursor:default">
        <div class="staff-avatar">${r.name[0]}</div>
        <div class="cust-info">
          <div class="cust-name">${r.name} <span style="font-size:11px;color:var(--text3)">(${r.status})</span></div>
          <div class="cust-meta">${r.assigned} assigned &middot; ${r.accepted} accepted &middot; ${r.timedOut} timed out${r.avgResp ? ' &middot; avg '+r.avgResp+' min' : ''}</div>
        </div>
      </div>`).join('') : '<p class="empty-msg">No executives configured</p>'}
  </div>

  <div class="card">
    <h3 class="card-title">Department Specialists &amp; TLs</h3>
    ${specialistRows.length ? specialistRows.map(r => `
      <div class="cust-row" style="cursor:default">
        <div class="staff-avatar">${r.name[0]}</div>
        <div class="cust-info">
          <div class="cust-name">${r.name} <span style="font-size:11px;color:var(--text3)">(${r.dept})</span></div>
          <div class="cust-meta">${r.assigned} tasks &middot; ${r.won} won &middot; ${r.lost} lost &middot; ${r.active} active${r.conv!==null ? ' &middot; '+r.conv+'% win rate' : ''}${r.avgResp ? ' &middot; avg '+r.avgResp+' min' : ''}</div>
        </div>
      </div>`).join('') : '<p class="empty-msg">No specialists configured</p>'}
  </div>
  `;
}

function drawAnalyticsCharts(invoices, visits) {
  if (typeof Chart === 'undefined') return;

  // Daily revenue - last 14 days
  const days14 = Array.from({length:14}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-13+i); return d;
  });
  const dailyRev = days14.map(d => {
    const key = d.toDateString();
    return invoices.filter(i => new Date(i.date).toDateString()===key).reduce((s,i)=>s+(i.total||0),0);
  });
  const dayLabels = days14.map(d => d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}));

  const dc = document.getElementById('daily-revenue-chart');
  if (dc) {
    new Chart(dc, {
      type: 'bar',
      data: { labels: dayLabels, datasets: [{ label: 'Revenue', data: dailyRev.map(v=>Math.round(v)), backgroundColor: 'rgba(200,151,43,0.7)', borderColor: '#C8972B', borderWidth: 1, borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
        scales: { x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#888', maxRotation: 45, autoSkip: false } },
          y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { font: { size: 10 }, color: '#888', callback: v => '₹'+Math.round(v/1000)+'K' } } } }
    });
  }

  // Dept doughnut
  const deptColors = { Tiles:'#378ADD', Sanitary:'#1D9E75', Plywood:'#7F77DD', Electricals:'#EF9F27', Paints:'#D85A30', Plumbing:'#D4537E', Appliances:'#888780' };
  const depts = Object.keys(deptColors);
  const deptRev = {};
  depts.forEach(d => deptRev[d] = 0);
  visits.forEach(v => {
    if (!v.invoiceId || !deptRev.hasOwnProperty(v.department)) return;
    const inv = invoices.find(i => i.id===v.invoiceId);
    if (inv) deptRev[v.department] = (deptRev[v.department]||0) + (inv.total||0);
  });
  const deptData = depts.map(d => Math.round(deptRev[d]||0));

  const drc = document.getElementById('dept-revenue-chart');
  if (drc) {
    new Chart(drc, {
      type: 'doughnut',
      data: { labels: depts, datasets: [{ data: deptData, backgroundColor: depts.map(d=>deptColors[d]), borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '65%' }
    });
  }
  const legend = document.getElementById('dept-legend');
  if (legend) {
    legend.innerHTML = depts.map(d =>
      `<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:#aaa">` +
      `<span style="width:8px;height:8px;border-radius:2px;background:${deptColors[d]};display:inline-block"></span>${d}</span>`
    ).join('');
  }

  // Walk-ins
  const days30 = Array.from({length:30}, (_,i) => { const d=new Date(); d.setDate(d.getDate()-29+i); return d; });
  const walkins = days30.map(d => visits.filter(v => new Date(v.date).toDateString()===d.toDateString()).length);
  const walkLabels = days30.map((d,i) => i%5===0 ? d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '');

  const wc = document.getElementById('walkin-chart');
  if (wc) {
    new Chart(wc, {
      type: 'line',
      data: { labels: walkLabels, datasets: [{ label: 'Walk-ins', data: walkins, borderColor: '#7F77DD', backgroundColor: 'rgba(127,119,221,0.1)', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
        scales: { x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#888' } },
          y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { font: { size: 10 }, color: '#888', callback: v => Math.round(v) } } } }
    });
  }
}

async function renderEngineBreakdown(customers, invoices) {
  const total = invoices.reduce((s,i)=>s+(i.total||0),0);
  const engines = [
    { name:'Retail', type:'retail', color:'#378ADD' },
    { name:'B2B Professionals', type:'b2b_pro', color:'#1D9E75' },
    { name:'B2B Shops', type:'b2b_shop', color:'#7F77DD' },
    { name:'TISAN / Private Label', type:'tisan', color:'#D85A30' },
    { name:'Contractor Club', type:'contractor_club', color:'#EF9F27' },
  ];
  const custTypeMap = {};
  customers.forEach(c => custTypeMap[c.id] = c.type);

  return engines.map(e => {
    const engineTotal = invoices.filter(i => custTypeMap[i.customerId]===e.type).reduce((s,i)=>s+(i.total||0),0);
    const pct = total ? Math.round(engineTotal/total*100) : 0;
    return `<div class="engine-row-an">
      <div class="engine-dot" style="background:${e.color}"></div>
      <div class="engine-name-an">${e.name}</div>
      <div class="engine-bar-bg-an"><div class="engine-bar-an" style="width:${pct}%;background:${e.color}"></div></div>
      <div class="engine-pct-an">${pct}%</div>
      <div class="engine-val-an">&#8377;${Math.round(engineTotal/1000)||0}K</div>
    </div>`;
  }).join('');
}

function generateInsights(invoices, visits, customers, leads, feedback) {
  const insights = [];
  const today = new Date();
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const thisMonthRev = invoices.filter(i=>new Date(i.date)>=monthStart).reduce((s,i)=>s+(i.total||0),0);
  const daysIn = today.getDate();
  const projected = Math.round(thisMonthRev/daysIn*30);

  if (projected > 0) insights.push({ icon:'📈', text:`At current pace, projected ₹${Math.round(projected/1000)}K this month.`, color:'var(--green)' });
  const repeatCount = customers.filter(c=>(c.visitCount||0)>1).length;
  if (repeatCount > 0) insights.push({ icon:'🔁', text:`${repeatCount} customers have visited more than once — strong retention.`, color:'var(--blue)' });
  const dueFollowups = leads.filter(l=>l.stage!=='Won'&&l.stage!=='Lost'&&l.followUpDate&&new Date(l.followUpDate)<=today).length;
  if (dueFollowups > 0) insights.push({ icon:'⏰', text:`${dueFollowups} leads have overdue follow-ups. Contact them today.`, color:'var(--gold)' });
  const avgRating = feedback.length ? feedback.reduce((s,f)=>s+(f.rating||0),0)/feedback.length : 0;
  if (avgRating > 0) insights.push({ icon:'⭐', text:`Average rating ${avgRating.toFixed(1)}/5. ${avgRating>=4?'Excellent — use this in investor updates.':'Focus on lower-rated departments.'}`, color: avgRating>=4?'var(--green)':'var(--gold)' });
  const repurchaseDue = customers.filter(c=>c.lastVisit&&(today-new Date(c.lastVisit))/86400000>=30).length;
  if (repurchaseDue > 0) insights.push({ icon:'📞', text:`${repurchaseDue} customers haven't visited in 30+ days. A WhatsApp nudge could bring them back.`, color:'#7F77DD' });

  if (!insights.length) return '<p class="empty-msg">Add customer and sales data to generate insights</p>';
  return insights.map(i => `<div class="insight-row"><span class="insight-icon">${i.icon}</span><span class="insight-text" style="color:${i.color}">${i.text}</span></div>`).join('');
}

let currentPage = 'dashboard';

function applyRolePermissions() {
  const allowed = VW_AUTH.getAllowedPages();

  document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
    const page = btn.dataset.page;
    if (page === 'more') return;
    btn.style.display = allowed.includes(page) ? '' : 'none';
  });

  let moreVisibleCount = 0;
  document.querySelectorAll('.more-btn[data-page]').forEach(btn => {
    const page = btn.dataset.page;
    const show = allowed.includes(page);
    btn.style.display = show ? '' : 'none';
    if (show) moreVisibleCount++;
  });
  const moreBtn = document.querySelector('.nav-btn[data-page="more"]');
  if (moreBtn) moreBtn.style.display = moreVisibleCount > 0 ? '' : 'none';

  document.querySelectorAll('.qa-btn[data-page]').forEach(btn => {
    btn.style.display = allowed.includes(btn.dataset.page) ? '' : 'none';
  });

  if (!allowed.includes(currentPage)) {
    navigateTo('dashboard');
  }
}

async function navigateTo(page) {
  const allowed = VW_AUTH.getAllowedPages();
  if (!allowed.includes(page)) {
    showToast("You don't have access to this section. Contact Management if you need it.", 'warn');
    if (currentPage !== page) return;
    page = 'dashboard';
  }
  currentPage = page;
  const content = document.getElementById('app-content');
  content.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`.nav-btn[data-page="${page}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  const moreMenu = document.getElementById('more-menu');
  if (moreMenu) moreMenu.style.display = 'none';

  try {
    let html = '';
    if (page === 'dashboard') html = await renderDashboard();
    else if (page === 'checkin') html = await VW_CHECKIN.renderCheckin();
    else if (page === 'cart') html = await renderBillingPage();
    else if (page === 'crm') html = await VW_CRM.renderCRM();
    else if (page === 'inventory') html = await VW_INVENTORY.renderInventory();
    else if (page === 'hr') html = await VW_HR.renderHR();
    else if (page === 'analytics') html = await VW_ANALYTICS.renderAnalytics();
    else if (page === 'tasks') html = await VW_TASKS.renderMyTasks();
    else if (page === 'settings') html = await renderSettingsPage();
    else if (page === 'club') html = await renderContractorClub();
    else if (page === 'feedback') html = await renderFeedbackPage();
    content.innerHTML = html || '<p style="padding:2rem;color:#888">Nothing here yet.</p>';
  } catch(err) {
    console.error('Navigation error:', err);
    content.innerHTML = `<div style="padding:2rem;text-align:center">
      <div style="font-size:2rem;margin-bottom:1rem">⚠️</div>
      <div style="color:#C8972B;font-weight:600;margin-bottom:8px">Something went wrong</div>
      <div style="color:#888;font-size:13px;margin-bottom:1.5rem">${err.message || 'Unknown error'}</div>
      <button onclick="navigateTo('${page}')" style="background:#C8972B;color:#000;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer">Try Again</button>
    </div>`;
  }
  content.scrollTo(0, 0);
  applyRolePermissions();
}

async function renderDashboard() {
  const [customers, visits, invoices, leads, feedback, tasks, products, quotations] = await Promise.all([
    VW_DB.all(VW_DB.STORES.customers),
    VW_DB.all(VW_DB.STORES.visits),
    VW_DB.all(VW_DB.STORES.invoices),
    VW_DB.all(VW_DB.STORES.leads),
    VW_DB.all(VW_DB.STORES.feedback),
    VW_DB.all(VW_DB.STORES.tasks),
    VW_DB.all(VW_DB.STORES.products),
    VW_DB.all(VW_DB.STORES.quotations)
  ]);

  const today = new Date().toDateString();
  const todayVisits = visits.filter(v => new Date(v.date).toDateString() === today);
  const todayCustomers = todayVisits.filter(v => v.visitorType === 'customer');
  const todayVisitors = todayVisits.filter(v => v.visitorType !== 'customer');
  const todayBilling = invoices.filter(i => new Date(i.date).toDateString() === today).reduce((s,i)=>s+(i.total||0),0);
  const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
  const monthBilling = invoices.filter(i => new Date(i.date) >= monthStart).reduce((s,i)=>s+(i.total||0),0);
  const wonLeads = leads.filter(l=>l.stage==='Won').length;
  const convRate = leads.length ? Math.round(wonLeads/leads.length*100) : 0;
  const avgRating = feedback.length ? (feedback.reduce((s,f)=>s+(f.rating||0),0)/feedback.length).toFixed(1) : '—';

  const deptCount = {};
  tasks.forEach(t => { if(t.department) deptCount[t.department] = (deptCount[t.department]||0)+1; });
  const topDept = Object.entries(deptCount).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // Urgent escalations (Floor Manager / Store Manager / Management level, still unaccepted)
  const profile = VW_AUTH.getCurrentProfile();
  let urgentBanner = '';
  if (profile && profile.role === 'admin') {
    const urgentLevels = ['floor_manager','store_manager','management'];
    const escalationContacts = await VW_DB.getSetting('escalationContacts', {});
    const contactKeyMap = { floor_manager:'floorManager', store_manager:'storeManager', management:'management' };
    const urgentItems = [];
    visits.forEach(v => {
      if (v.status !== 'pending') return;
      const last = (v.escalationLog||[]).slice(-1)[0];
      if (last && last.status === 'pending' && urgentLevels.includes(last.level)) {
        urgentItems.push({ id: v.id, type: 'visit', name: v.customerName || 'Customer', level: last.level, since: last.notifiedAt, dept: '' });
      }
    });
    tasks.forEach(t => {
      if (t.status !== 'pending') return;
      const last = (t.escalationLog||[]).slice(-1)[0];
      if (last && last.status === 'pending' && urgentLevels.includes(last.level)) {
        urgentItems.push({ id: t.id, type: 'task', name: t.customerName || 'Customer', level: last.level, since: last.notifiedAt, dept: t.department || '' });
      }
    });
    if (urgentItems.length) {
      urgentBanner = `
      <div class="alert-card">
        <div class="alert-title">🚨 ${urgentItems.length} Needs Urgent Attention — tap to view &amp; resolve</div>
        ${urgentItems.map(it => {
          const waitMin = Math.max(1, Math.round((Date.now() - new Date(it.since).getTime())/60000));
          const levelLabel = VW_ESCALATION.LEVEL_LABELS[it.level] || it.level;
          const contact = escalationContacts[contactKeyMap[it.level]] || {};
          const msg = VW_NOTIFY.waEncode(`🚨 URGENT: ${it.name} has been waiting ${waitMin} min at V Wholesale with no response. Please attend immediately.`);
          const openFn = it.type === 'visit' ? `VW_CHECKIN.openVisitDetail(${it.id})` : `VW_TASKS.openTaskDetail(${it.id})`;
          return `<div class="cust-row" onclick="${openFn}">
            <div class="staff-avatar" style="background:rgba(239,68,68,0.15);color:var(--red)">🚨</div>
            <div class="cust-info"><div class="cust-name">${it.name}${it.dept?' &middot; '+it.dept:''}</div><div class="cust-meta">Waiting ${waitMin} min &middot; Escalated to ${levelLabel}${contact.name?' ('+contact.name+')':''}</div></div>
            ${contact.phone ? `<a class="btn-call" style="flex:0;padding:8px 12px;background:rgba(34,197,94,0.12);color:#22c55e;border-color:rgba(34,197,94,0.3)" href="https://wa.me/91${contact.phone}?text=${msg}" target="_blank" onclick="event.stopPropagation()">💬</a>` : ''}
          </div>`;
        }).join('')}
      </div>`;
    }
  }

  // Low-stock products (Admin only)
  let lowStockBanner = '';
  if (profile && profile.role === 'admin') {
    const lowStock = products.filter(p => p.stock <= (p.lowStockThreshold || 20));
    if (lowStock.length) {
      lowStockBanner = `
      <div class="alert-card">
        <div class="alert-title">📦 ${lowStock.length} Item${lowStock.length>1?'s':''} Low on Stock</div>
        ${lowStock.slice(0,5).map(p => `
          <div class="followup-row">
            <div class="fu-info"><div class="fu-name">${p.name}</div><div class="fu-dept">${p.category} &middot; ${p.stock} ${p.unit} left</div></div>
            <button class="btn-sm" onclick="navigateTo('inventory')">View</button>
          </div>`).join('')}
        ${lowStock.length > 5 ? `<p style="font-size:12px;color:var(--text3);margin-top:4px">+${lowStock.length-5} more — see Inventory</p>` : ''}
      </div>`;
    }
  }

  // Quotations summary (status + department breakdown)
  let quotesCard = '';
  if (quotations.length) {
    const qCounts = { draft:0, sent:0, converted:0 };
    const qDeptCount = {};
    quotations.forEach(q => {
      qCounts[q.status] = (qCounts[q.status]||0)+1;
      (q.items||[]).forEach(it => { if (it.department) qDeptCount[it.department] = (qDeptCount[it.department]||0)+1; });
    });
    const topQDepts = Object.entries(qDeptCount).sort((a,b)=>b[1]-a[1]).slice(0,3);
    quotesCard = `
    <div class="card">
      <div class="card-header-row">
        <h3 class="card-title">Quotations</h3>
        <button class="btn-sm" onclick="goToQuotations()">View All</button>
      </div>
      <div class="stat-row">
        <div class="stat"><span class="stat-num">${qCounts.draft||0}</span><span class="stat-label">Draft</span></div>
        <div class="stat"><span class="stat-num">${qCounts.sent||0}</span><span class="stat-label">Sent</span></div>
        <div class="stat"><span class="stat-num">${qCounts.converted||0}</span><span class="stat-label">Converted</span></div>
      </div>
      ${topQDepts.length ? `<p style="font-size:12px;color:var(--text3);margin-top:8px">Top categories: ${topQDepts.map(([d,c])=>`${d} (${c})`).join(', ')}</p>` : ''}
    </div>`;
  }

  // ===== APPROVAL CARDS (Credit Sales / Price Overrides / Quotations) =====
  // Three separate cards rather than one combined list, scoped to what
  // THIS viewer can actually act on right now (same logic as the detail
  // screens use) so nobody sees a pile of approvals that aren't theirs.
  const pendingInvoices = invoices.filter(i => i.approvalStatus === 'pending_approval');
  const creditPending = [];
  const overridePending = [];
  for (const inv of pendingInvoices) {
    if (!(await currentUserCanApproveInvoice(inv))) continue;
    if (inv.creditSale) creditPending.push(inv);
    else if (inv.approvalReason === 'price_override') overridePending.push(inv);
  }
  const quotePending = [];
  for (const q of quotations.filter(q => q.approvalStatus === 'pending_approval')) {
    if (await currentUserCanApprove(q)) quotePending.push(q);
  }

  const approvalCards = (creditPending.length || overridePending.length || quotePending.length) ? `
  <div class="approval-cards-row">
    ${creditPending.length ? `
    <div class="card approval-card" onclick="goToQuotations()" style="cursor:pointer">
      <h3 class="card-title">💳 Credit Sales <span class="badge">${creditPending.length}</span></h3>
      ${creditPending.slice(0,3).map(i => `<div style="font-size:12px;padding:3px 0">${i.invoiceNo} — ₹${i.total.toLocaleString('en-IN')}</div>`).join('')}
    </div>` : ''}
    ${overridePending.length ? `
    <div class="card approval-card" onclick="goToQuotations()" style="cursor:pointer">
      <h3 class="card-title">💰 Price Overrides <span class="badge">${overridePending.length}</span></h3>
      ${overridePending.slice(0,3).map(i => `<div style="font-size:12px;padding:3px 0">${i.invoiceNo} — ₹${i.total.toLocaleString('en-IN')}</div>`).join('')}
    </div>` : ''}
    ${quotePending.length ? `
    <div class="card approval-card" onclick="goToQuotations()" style="cursor:pointer">
      <h3 class="card-title">📄 Quotations <span class="badge">${quotePending.length}</span></h3>
      ${quotePending.slice(0,3).map(q => `<div style="font-size:12px;padding:3px 0">${q.quoteNo||''} — ${q.customerName||''}</div>`).join('')}
    </div>` : ''}
  </div>` : '';

  return `
  <div class="module-header">
    <div class="dash-logo">
      <div class="logo-mark">VW</div>
      <div><div class="logo-name">V Wholesale</div><div class="logo-sub">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div></div>
    </div>
  </div>

  ${urgentBanner}
  ${approvalCards}
  ${lowStockBanner}
  ${quotesCard}

  <div class="metric-grid-4">
    <div class="metric-card gold">
      <div class="mc-label">Today's Billing</div>
      <div class="mc-value">₹${todayBilling > 0 ? Math.round(todayBilling/1000)+'K' : '0'}</div>
    </div>
    <div class="metric-card">
      <div class="mc-label">Month Billing</div>
      <div class="mc-value">₹${monthBilling > 0 ? Math.round(monthBilling/100000)+'L' : '0'}</div>
    </div>

async function renderRecentActivity(visits, customers) {
  const custMap = {};
  customers.forEach(c => custMap[c.id] = c);
  const recent = visits.slice(-8).reverse();
  if (!recent.length) return '<p class="empty-msg">No activity yet — start by checking in a customer</p>';

  const allTasks = await VW_DB.all(VW_DB.STORES.tasks);
  const deptsByVisit = {};
  allTasks.forEach(t => {
    if (!t.visitId || !t.department) return;
    deptsByVisit[t.visitId] = deptsByVisit[t.visitId] || new Set();
    deptsByVisit[t.visitId].add(t.department);
  });

  return recent.map(v => {
    const depts = deptsByVisit[v.id] ? [...deptsByVisit[v.id]].join(', ') : (v.visitorType || 'Visit');
    return `
    <div class="activity-row">
      <div class="activity-dot" style="background:${{active:'#C8972B',billed:'#22c55e',left:'#888'}[v.status]||'#888'}"></div>
      <div class="activity-info">
        <div class="activity-name">${custMap[v.customerId]?.name || v.customerName || 'Customer'}</div>
        <div class="activity-meta">${depts} · ${new Date(v.date).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div class="activity-status">${v.status}</div>
    </div>`;
  }).join('');
}

async function renderCCMembers(members, invoices) {
  if (!members.length) return '<p class="empty-msg">No Contractor Club members yet</p>';
  return members.map(m => {
    const mInvoices = invoices.filter(i=>i.customerId===m.id);
    const totalSpend = mInvoices.reduce((s,i)=>s+(i.total||0),0);
    const tier = m.ccTier || 'Silver';
    const tierColors = { Silver:'#888', Gold:'#C8972B', Platinum:'#7F77DD' };
    return `<div class="cc-member-row" onclick="openCustomer(${m.id})">
      <div class="cust-avatar" style="background:${tierColors[tier]}22;color:${tierColors[tier]}">${(m.name||'?')[0]}</div>
      <div class="cust-info"><div class="cust-name">${m.name}</div><div class="cust-meta">${m.phone} · ${mInvoices.length} orders · ₹${Math.round(totalSpend/1000)}K spent</div></div>
      <div class="tier-badge" style="color:${tierColors[tier]}">${tier}</div>
    </div>`;
  }).join('');
}

function calcReferral() {
  const amt = parseFloat(document.getElementById('ref-amount').value);
  const type = document.getElementById('ref-type').value;
  if (!amt) { document.getElementById('ref-result').style.display='none'; return; }
  const pct = type === 'first' ? 2 : 0.5;
  const bonus = Math.round(amt * pct / 100);
  const div = document.getElementById('ref-result');
  div.style.display = 'block';
  div.innerHTML = `<span class="ref-pct">${pct}% of ₹${amt.toLocaleString('en-IN')}</span><span class="ref-bonus">= ₹${bonus.toLocaleString('en-IN')} bonus</span>`;
}

async function submitFeedback() {
  if (!selectedRating) return showToast('Please select a rating', 'warn');

  await VW_DB.put(VW_DB.STORES.feedback, {
    visitId, customerId, rating: selectedRating,
    positive: document.getElementById('fb-positive').value,
    suggestion: document.getElementById('fb-suggestion').value,
    department: document.getElementById('fb-dept').value,
    date: new Date().toISOString()

  const timeAgo = formatTimeAgo(n.createdAt);

    ${(n.actions||[]).length ? `
    <div style="display:flex;gap:6px;margin-top:8px">
      ${n.actions.map(a => `<button class="btn-sm" onclick="event.stopPropagation();handleNotificationAction(${n.id},'${a.action}')">${a.label}</button>`).join('')}
    </div>` : ''}
  </div>`;
}

function formatTimeAgo(isoString) {
  const diffMs = Date.now() - new Date(isoString).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  return `${Math.floor(hours/24)}d ago`;
}
