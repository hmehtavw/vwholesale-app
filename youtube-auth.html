<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>YouTube Auth — V Wholesale</title>
<style>
body{font-family:system-ui;background:#0f172a;color:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:32px;max-width:500px;width:100%}
h2{color:#ff0000;margin:0 0 16px}
.ok{background:rgba(34,197,94,.1);border:1px solid #22c55e;color:#22c55e;padding:10px;border-radius:8px;margin:8px 0;font-size:13px}
.err{background:rgba(239,68,68,.1);border:1px solid #ef4444;color:#ef4444;padding:10px;border-radius:8px;margin:8px 0;font-size:13px;word-break:break-all}
.step{background:#0f172a;border-radius:8px;padding:12px;margin:8px 0;font-size:13px;line-height:1.6}
button{background:#ff0000;color:#fff;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;width:100%;margin:6px 0}
</style>
</head>
<body>
<div class="box">
  <h2>▶️ Connect YouTube</h2>
  <div id="main"></div>
</div>
<script>
const SB_URL = 'https://ndamdnlsuktucqtcbhgp.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kYW1kbmxzdWt0dWNxdGNiaGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTg1MzgsImV4cCI6MjA5Njk5NDUzOH0.7pGJu4bbNhl4E-4Do24jS9_p6nLUa1eN4JXQSqEF9VU';
const CLIENT_ID = '825770975900-hu3d3edgjaup25ec16vin7jpjs4phlo5.apps.googleusercontent.com';
const REDIRECT = 'https://vwholesale.in/youtube-auth.html';
const SCOPE = 'https://www.googleapis.com/auth/youtube.upload https://www.googleapis.com/auth/youtube';
const main = document.getElementById('main');

async function saveToDb(rows) {
  await fetch(SB_URL+'/rest/v1/marketing_settings', {
    method:'POST',
    headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},
    body:JSON.stringify(rows)
  });
}

async function run() {
  const p = new URLSearchParams(window.location.search);
  const code = p.get('code');
  const err = p.get('error');

  if (err) {
    main.innerHTML = '<div class="err">❌ '+err+': '+(p.get('error_description')||'')+'</div>'
      +'<button onclick="startAuth()">Try Again</button>';
    return;
  }

  if (code) {
    main.innerHTML = '<div class="step">⏳ Exchanging code for tokens…</div>';
    try {
      // Exchange code via edge function (has access to secret)
      const tr = await fetch(SB_URL+'/functions/v1/youtube-upload', {
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SB_KEY},
        body: JSON.stringify({action:'exchange_code', code, redirect_uri:REDIRECT})
      });
      const td = await tr.json();
      if (!td.access_token) throw new Error(td.error||JSON.stringify(td));

      // Tokens already saved by edge function

      // Verify
      const mr = await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet&mine=true',
        {headers:{Authorization:'Bearer '+td.access_token}});
      const md = await mr.json();
      const ch = md.items?.[0];
      window.history.replaceState({},'','/youtube-auth.html');
      main.innerHTML = '<div class="ok">✅ YouTube connected! '+(ch?'Channel: '+ch.snippet.title:'')+'</div>'
        +'<div class="step">Tokens saved. YouTube posts will upload automatically from Post Now.</div>'
        +'<button onclick="window.location.href=\'/marketing.html\'">→ Back to Marketing Portal</button>';
    } catch(e) {
      main.innerHTML = '<div class="err">❌ '+e.message+'</div><button onclick="startAuth()">Try Again</button>';
    }
    return;
  }

  // Default: show authorize button
  main.innerHTML = '<div class="step">⚠️ Make sure you are logged into the <strong>V Wholesale Google account</strong> before clicking below.</div>'
    +'<button onclick="startAuth()">▶️ Authorize YouTube Access</button>';
}

function startAuth() {
  const url = 'https://accounts.google.com/o/oauth2/v2/auth'
    +'?client_id='+encodeURIComponent(CLIENT_ID)
    +'&redirect_uri='+encodeURIComponent(REDIRECT)
    +'&response_type=code'
    +'&scope='+encodeURIComponent(SCOPE)
    +'&access_type=offline&prompt=consent';
  window.location.href = url;
}

run();
</script>
</body>
</html>
