<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Approve Post · V Wholesale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;padding:16px 14px}
.card{background:#1e293b;border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid #334155}
.label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.topic{font-size:17px;font-weight:900;line-height:1.3;margin-bottom:6px}
.meta{font-size:12px;color:#94a3b8;margin-bottom:10px}
textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:11px;color:#f1f5f9;font-size:13px;line-height:1.6;resize:vertical;min-height:110px;font-family:inherit}
textarea:focus{outline:none;border-color:#c9a84c}
input[type=text]{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:11px;color:#f1f5f9;font-size:13px;font-family:inherit}
input[type=text]:focus{outline:none;border-color:#c9a84c}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.btn-approve{background:#22c55e;color:#fff}
.btn-reject{background:#1e293b;color:#ef4444;border:1px solid #ef4444}
.btn:disabled{opacity:.5;cursor:not-allowed}
.post-image{width:100%;border-radius:10px;display:block}
.pill{display:inline-block;background:#334155;border-radius:20px;padding:3px 10px;font-size:11px;margin:2px}
.success-box{background:#064e3b;border:1px solid #059669;border-radius:12px;padding:24px;text-align:center;margin-top:40px}
.error-box{background:#450a0a;border:1px solid #ef4444;border-radius:12px;padding:24px;text-align:center;margin-top:40px}
.loading{text-align:center;padding:48px 20px;color:#64748b}
.spinner{width:32px;height:32px;border:3px solid #334155;border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.reel-box{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;font-size:12px;line-height:1.8;white-space:pre-wrap;color:#cbd5e1;margin-top:8px;max-height:240px;overflow-y:auto}
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;margin-right:4px}
.bdg-reel{background:rgba(201,168,76,.15);color:#c9a84c}
.bdg-festival{background:rgba(245,158,11,.15);color:#f59e0b}
.bdg-image{background:rgba(59,130,246,.15);color:#60a5fa}
.bdg-approved{background:#064e3b;color:#6ee7b7}
.header{text-align:center;margin-bottom:20px;padding-top:6px}
.header-brand{font-size:10px;color:#64748b;font-weight:700;letter-spacing:.1em}
.header-sub{font-size:12px;color:#94a3b8;margin-top:2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">V WHOLESALE</div>
  <div class="header-sub">Content Approval</div>
</div>

<div id="app"><div class="loading"><div class="spinner"></div>Loading post…</div></div>

<script>
const PIPELINE = 'https://ndamdnlsuktucqtcbhgp.supabase.co/functions/v1/content-pipeline';
const SUPABASE_URL = 'https://ndamdnlsuktucqtcbhgp.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kYW1kbmxzdWt0dWNxdGNiaGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTg1MzgsImV4cCI6MjA5Njk5NDUzOH0.7pGJu4bbNhl4E-4Do24jS9_p6nLUa1eN4JXQSqEF9VU';
const token = new URLSearchParams(location.search).get('token');
let item = null;

function api(body) {
  return fetch(PIPELINE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': ANON },
    body: JSON.stringify(body)
  }).then(r => r.json());
}

// Upload image to Supabase storage and save URL to content_calendar
async function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('img-upload-status');
  const preview = document.getElementById('img-preview');
  const previewImg = document.getElementById('img-preview-img');
  status.textContent = '⏳ Uploading…';

  // Show local preview immediately
  const localUrl = URL.createObjectURL(file);
  previewImg.src = localUrl;
  preview.style.display = 'block';

  try {
    // Upload to Supabase storage via signed upload
    const ext = file.name.split('.').pop() || 'jpg';
    const path = `calendar/manual_${token}_${Date.now()}.${ext}`;
    const uploadRes = await fetch(
      `${SUPABASE_URL}/storage/v1/object/calendar-images/${path}`,
      {
        method: 'POST',
        headers: { 'apikey': ANON, 'Authorization': `Bearer ${ANON}`, 'Content-Type': file.type, 'x-upsert': 'true' },
        body: file
      }
    );
    if (!uploadRes.ok) throw new Error('Upload failed: ' + uploadRes.status);

    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/calendar-images/${path}`;

    // Save to content_calendar via pipeline approve action (image_url field)
    // We use a direct DB update via the approve endpoint — pass image_url
    const saveRes = await fetch(PIPELINE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON },
      body: JSON.stringify({ action: 'save_image', token, image_url: publicUrl })
    });
    const saveData = await saveRes.json();
    if (saveData.ok) {
      status.textContent = '✅ Image uploaded and saved!';
      previewImg.src = publicUrl;
    } else {
      status.textContent = '✅ Image uploaded — will use on approval';
      // Store locally for use on approve
      window._uploadedImageUrl = publicUrl;
    }
  } catch(err) {
    status.textContent = '❌ Upload failed — ' + err.message;
    window._uploadedImageUrl = null;
  }
}

function fmtDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString('en-IN', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function chIcon(c) {
  if(c.includes('instagram')) return '📸 Instagram';
  if(c.includes('facebook')) return '👤 Facebook';
  if(c.includes('threads')) return '🧵 Threads';
  if(c.includes('youtube')) return '▶️ YouTube';
  if(c.includes('gbp')) return '📍 GBP';
  return c;
}

async function load() {
  if (!token) { showError('No approval token in URL.'); return; }
  let data;
  try { data = await api({ action: 'get', token }); } 
  catch(e) { showError('Network error: ' + e.message); return; }
  if (!data.ok) { showError(data.error || 'Link expired or invalid.'); return; }
  item = data.item;
  render();
}

function render() {
  const chs = item.platform || ['instagram_feed','facebook_post','threads'];
  const approved = item.status === 'approved';
  const typeLabel = item.is_reel ? '🎬 Reel' : item.is_festival ? '🎉 Festival' : '🖼️ Image';
  const bdgClass = item.is_reel ? 'bdg-reel' : item.is_festival ? 'bdg-festival' : 'bdg-image';

  const app = document.getElementById('app');
  app.innerHTML = '';

  // Already approved banner
  if (approved) {
    const b = document.createElement('div');
    b.className = 'card';
    b.style.cssText = 'background:#064e3b;border-color:#059669;margin-bottom:12px;text-align:center';
    b.innerHTML = '<div style="font-size:13px;color:#6ee7b7">✅ Already approved — will post at ' + (item.post_time||'10:00') + ' on ' + fmtDate(item.cal_date) + '</div>';
    app.appendChild(b);
  }

  // Header card
  const hdr = document.createElement('div');
  hdr.className = 'card';
  hdr.innerHTML =
    '<span class="badge ' + bdgClass + '">' + typeLabel + '</span>' +
    (approved ? '<span class="badge bdg-approved">APPROVED</span>' : '') +
    '<div class="topic" style="margin-top:10px">' + esc(item.topic) + '</div>' +
    '<div class="meta">📅 ' + fmtDate(item.cal_date) + ' · 🕙 ' + (item.post_time||'10:00') + ' IST</div>' +
    '<div>' + chs.map(c => '<span class="pill">' + chIcon(c) + '</span>').join('') + '</div>';
  app.appendChild(hdr);

  // Image
  if (item.image_url) {
    const imgCard = document.createElement('div');
    imgCard.className = 'card';
    imgCard.style.padding = '10px';
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = 'Generated Image';
    const img = document.createElement('img');
    img.className = 'post-image';
    img.src = item.image_url;
    img.onerror = function() { imgCard.style.display = 'none'; };
    imgCard.appendChild(lbl);
    imgCard.appendChild(img);
    app.appendChild(imgCard);
  } else {
    const uploadCard = document.createElement('div');
    uploadCard.className = 'card';
    uploadCard.id = 'upload-card';

    // Image prompt section
    const promptHtml = item.visual_brief
      ? '<div style="margin-bottom:14px;background:#0f172a;border-radius:8px;padding:12px">' +
        '<div class="label" style="margin-bottom:6px">🎨 Image Generation Prompt</div>' +
        '<div style="font-size:12px;color:#e2e8f0;line-height:1.6;font-family:monospace;white-space:pre-wrap">' + esc(item.visual_brief) + '</div>' +
        '<div style="font-size:11px;color:#64748b;margin-top:6px">Paste into Midjourney, ChatGPT, Canva AI or any image tool. Add V Wholesale branding + text on top.</div>' +
        '<button onclick="navigator.clipboard.writeText(' + JSON.stringify(item.visual_brief||'') + ').then(()=>this.textContent=\'✅ Copied!\').catch(()=>{})" style="margin-top:8px;padding:6px 14px;background:#1e3a5f;border:none;border-radius:6px;color:#93c5fd;font-size:11px;cursor:pointer">📋 Copy Prompt</button>' +
        '</div>'
      : '';

    // Hashtags
    const hashtagsHtml = item.hashtags && item.hashtags.length
      ? '<div style="margin-bottom:14px;background:#0f172a;border-radius:8px;padding:12px">' +
        '<div class="label" style="margin-bottom:6px">🔖 Hashtags</div>' +
        '<div style="font-size:12px;color:#c9a84c;line-height:1.8">' + (item.hashtags||[]).join(' ') + '</div>' +
        '<button onclick="navigator.clipboard.writeText(' + JSON.stringify((item.hashtags||[]).join(' ')) + ').then(()=>this.textContent=\'✅ Copied!\').catch(()=>{})" style="margin-top:8px;padding:6px 14px;background:#1e293b;border:none;border-radius:6px;color:#94a3b8;font-size:11px;cursor:pointer">📋 Copy Hashtags</button>' +
        '</div>'
      : '';

    uploadCard.innerHTML = '<div class="label">📸 Upload Your Image</div>' +
      '<div style="color:#94a3b8;font-size:12px;margin-bottom:12px">Create your image using the prompt below, add branding/text, then upload here.</div>' +
      promptHtml +
      hashtagsHtml +
      '<input type="file" id="img-upload" accept="image/*" style="display:none">' +
      '<div id="img-preview" style="display:none;margin-bottom:10px"><img id="img-preview-img" style="width:100%;border-radius:8px" alt="Preview"></div>' +
      '<button onclick="document.getElementById(\'img-upload\').click()" style="width:100%;padding:12px;background:#1e293b;border:1px dashed #475569;border-radius:8px;color:#94a3b8;font-size:13px;cursor:pointer">📁 Choose Image to Upload</button>' +
      '<div id="img-upload-status" style="font-size:12px;color:#94a3b8;margin-top:8px;text-align:center"></div>';
    app.appendChild(uploadCard);
    setTimeout(() => {
      const fileInput = document.getElementById('img-upload');
      if (fileInput) fileInput.addEventListener('change', handleImageUpload);
    }, 100);
  }

  // Reel script
  if (item.is_reel && item.reel_script) {
    const rs = document.createElement('div');
    rs.className = 'card';
    rs.innerHTML = '<div class="label">🎬 Reel Script — Film This</div>';
    const box = document.createElement('div');
    box.className = 'reel-box';
    box.textContent = item.reel_script;
    rs.appendChild(box);
    app.appendChild(rs);
  }

  // Caption EN (editable)
  const capEnCard = document.createElement('div');
  capEnCard.className = 'card';
  capEnCard.innerHTML = '<div class="label">Caption (English) — tap to edit</div>';
  const capEn = document.createElement('textarea');
  capEn.id = 'caption-en';
  capEn.value = item.caption || '';
  if (approved) capEn.readOnly = true;
  capEnCard.appendChild(capEn);
  app.appendChild(capEnCard);

  // Caption TE (editable)
  const capTeCard = document.createElement('div');
  capTeCard.className = 'card';
  capTeCard.innerHTML = '<div class="label">Caption (Telugu) — tap to edit</div>';
  const capTe = document.createElement('textarea');
  capTe.id = 'caption-te';
  capTe.value = item.caption_te || '';
  if (approved) capTe.readOnly = true;
  capTeCard.appendChild(capTe);
  app.appendChild(capTeCard);

  // Price/offer (non-festival only)
  if (!item.is_festival) {
    const priceCard = document.createElement('div');
    priceCard.className = 'card';
    priceCard.innerHTML = '<div class="label">💰 Price / Offer (optional)</div>';
    const priceIn = document.createElement('input');
    priceIn.type = 'text';
    priceIn.id = 'price-note';
    priceIn.placeholder = 'e.g. Italian Marble from ₹85/sq.ft · Offer till 31 July';
    if (approved) priceIn.readOnly = true;
    priceCard.appendChild(priceIn);
    app.appendChild(priceCard);
  }

  // Buttons
  if (!approved) {
    const btnApprove = document.createElement('button');
    btnApprove.className = 'btn btn-approve';
    btnApprove.id = 'btn-approve';
    btnApprove.textContent = '✅ Approve — Post on ' + fmtDate(item.cal_date);
    btnApprove.onclick = approve;
    app.appendChild(btnApprove);

    const btnReject = document.createElement('button');
    btnReject.className = 'btn btn-reject';
    btnReject.id = 'btn-reject';
    btnReject.textContent = '❌ Reject — Regenerate';
    btnReject.onclick = reject;
    app.appendChild(btnReject);
  }

  const footer = document.createElement('div');
  footer.style.cssText = 'text-align:center;font-size:11px;color:#475569;margin-top:8px;padding-bottom:24px';
  footer.textContent = 'V Wholesale Marketing · Auto-pipeline';
  app.appendChild(footer);
}

async function approve() {
  const btn = document.getElementById('btn-approve');
  btn.disabled = true; btn.textContent = '⏳ Approving…';
  try {
    const data = await api({
      action: 'approve', token,
      edited_caption: document.getElementById('caption-en').value,
      edited_caption_te: document.getElementById('caption-te').value,
      edited_price_note: (document.getElementById('price-note')||{}).value || ''
    });
    if (data.ok) {
      document.getElementById('app').innerHTML =
        '<div class="success-box">' +
        '<div style="font-size:40px;margin-bottom:14px">✅</div>' +
        '<div style="font-size:18px;font-weight:900;margin-bottom:8px">Approved!</div>' +
        '<div style="font-size:13px;color:#6ee7b7">' + (data.message||'') + '</div>' +
        '<div style="font-size:11px;color:#064e3b;margin-top:12px">You can close this window</div>' +
        '</div>';
    } else {
      btn.disabled = false; btn.textContent = '✅ Approve';
      alert('Error: ' + (data.error || 'Something went wrong'));
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = '✅ Approve';
    alert('Network error: ' + e.message);
  }
}

async function reject() {
  const reason = prompt('Reason? (optional — press OK to skip)');
  if (reason === null) return;
  const btn = document.getElementById('btn-reject');
  btn.disabled = true; btn.textContent = '⏳…';
  try {
    const data = await api({ action: 'reject', token, reason });
    if (data.ok) {
      document.getElementById('app').innerHTML =
        '<div class="error-box">' +
        '<div style="font-size:40px;margin-bottom:14px">🔄</div>' +
        '<div style="font-size:18px;font-weight:900;margin-bottom:8px">Rejected</div>' +
        '<div style="font-size:13px;color:#fca5a5">Will regenerate tomorrow at 6am</div>' +
        '<div style="font-size:11px;color:#450a0a;margin-top:12px">You can close this window</div>' +
        '</div>';
    } else {
      btn.disabled = false; btn.textContent = '❌ Reject';
      alert('Error: ' + (data.error || 'Something went wrong'));
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = '❌ Reject';
    alert('Network error: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('app').innerHTML =
    '<div class="error-box">' +
    '<div style="font-size:32px;margin-bottom:12px">⚠️</div>' +
    '<div style="font-weight:700;margin-bottom:6px">Link Invalid</div>' +
    '<div style="font-size:13px;color:#fca5a5">' + msg + '</div>' +
    '<div style="font-size:11px;color:#7f1d1d;margin-top:12px">Links expire after 48 hours</div>' +
    '</div>';
}

load();
</script>
</body>
</html>
