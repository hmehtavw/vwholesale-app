<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Approve Post · V Wholesale</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;padding:16px}
  .card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid #334155}
  .gold{color:#c9a84c}
  .label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .topic{font-size:18px;font-weight:900;margin-bottom:4px}
  .meta{font-size:12px;color:#94a3b8}
  textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;color:#f1f5f9;font-size:13px;line-height:1.6;resize:vertical;min-height:120px;font-family:inherit}
  textarea:focus{outline:none;border-color:#c9a84c}
  input[type=text]{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;color:#f1f5f9;font-size:13px;font-family:inherit}
  input[type=text]:focus{outline:none;border-color:#c9a84c}
  .btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;letter-spacing:.01em}
  .btn-approve{background:#22c55e;color:#fff}
  .btn-reject{background:#1e293b;color:#ef4444;border:1px solid #ef4444}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .post-image{width:100%;border-radius:12px;margin-bottom:12px;display:block}
  .channel-pill{display:inline-block;background:#334155;border-radius:20px;padding:4px 10px;font-size:11px;margin:3px}
  .success{background:#064e3b;border:1px solid #059669;border-radius:12px;padding:20px;text-align:center}
  .error-box{background:#450a0a;border:1px solid #ef4444;border-radius:12px;padding:20px;text-align:center}
  .loading{text-align:center;padding:40px;color:#64748b}
  .spinner{width:32px;height:32px;border:3px solid #334155;border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .reel-box{background:#1a1a2e;border:1px solid #c9a84c33;border-radius:10px;padding:14px;font-size:12px;line-height:1.8;white-space:pre-wrap;color:#e2e8f0;margin-top:8px}
  .badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-right:4px}
  .badge-reel{background:rgba(201,168,76,.15);color:#c9a84c}
  .badge-festival{background:rgba(245,158,11,.15);color:#f59e0b}
  .badge-image{background:rgba(59,130,246,.15);color:#60a5fa}
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:20px;padding-top:8px">
  <div style="font-size:11px;color:#64748b;font-weight:700;letter-spacing:.1em">V WHOLESALE</div>
  <div style="font-size:13px;color:#94a3b8">Content Approval</div>
</div>

<div id="app"><div class="loading"><div class="spinner"></div>Loading post…</div></div>

<script>
const SB_URL = 'https://ndamdnlsuktucqtcbhgp.supabase.co';
const PIPELINE = SB_URL + '/functions/v1/content-pipeline';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kYW1kbmxzdWt0dWNxdGNiaGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTg1MzgsImV4cCI6MjA5Njk5NDUzOH0.7pGJu4bbNhl4E-4Do24jS9_p6nLUa1eN4JXQSqEF9VU';

const token = new URLSearchParams(window.location.search).get('token');
let currentItem = null;

async function api(body) {
  const r = await fetch(PIPELINE, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':ANON},
    body:JSON.stringify(body)
  });
  return r.json();
}

async function load() {
  if(!token) { showError('No approval token in URL.'); return; }
  const data = await api({action:'get',token});
  if(!data.ok) { showError(data.error||'Link expired or invalid.'); return; }
  currentItem = data.item;
  render(data.item);
}

function fmt(dateStr) {
  const d = new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function channelIcon(c) {
  if(c.includes('instagram')) return '📸 Instagram';
  if(c.includes('facebook')) return '👤 Facebook';
  if(c.includes('threads')) return '🧵 Threads';
  if(c.includes('youtube')) return '▶️ YouTube';
  if(c.includes('gbp')) return '📍 GBP';
  return c;
}

function render(item) {
  const channels = item.platform||['instagram_feed','facebook_post','threads'];
  const typeLabel = item.is_reel ? 'reel' : (item.is_festival ? 'festival' : 'image');
  const badgeClass = item.is_reel ? 'badge-reel' : (item.is_festival ? 'badge-festival' : 'badge-image');
  const typeIcon = item.is_reel ? '🎬' : (item.is_festival ? '🎉' : '🖼️');

  const alreadyApproved = item.status === 'approved';

  document.getElementById('app').innerHTML = `
    ${alreadyApproved ? `<div class="success" style="margin-bottom:12px">✅ Already approved — will post at ${item.post_time||'10:00'} on ${fmt(item.cal_date)}</div>` : ''}

    <!-- Header -->
    <div class="card">
      <div style="margin-bottom:12px">
        <span class="badge ${badgeClass}">${typeIcon} ${typeLabel.toUpperCase()}</span>
        ${item.is_festival ? '<span class="badge badge-festival">FESTIVAL</span>' : ''}
      </div>
      <div class="topic">${item.topic}</div>
      <div class="meta" style="margin-top:6px">📅 ${fmt(item.cal_date)} · 🕙 ${item.post_time||'10:00'} IST</div>
      <div style="margin-top:10px">
        ${channels.map(c=>`<span class="channel-pill">${channelIcon(c)}</span>`).join('')}
      </div>
    </div>

    <!-- Image -->
    ${item.image_url ? `
    <div class="card" style="padding:12px">
      <div class="label">Generated Image</div>
      <img src="${item.image_url}" class="post-image" onerror="this.style.display='none'">
    </div>` : ''}

    <!-- Reel script -->
    ${item.is_reel && item.reel_script ? `
    <div class="card">
      <div class="label">🎬 Reel Script — Film This</div>
      <div class="reel-box">${item.reel_script}</div>
    </div>` : ''}

    <!-- Caption (editable) -->
    <div class="card">
      <div class="label">Caption (English) — tap to edit</div>
      <textarea id="caption-en" ${alreadyApproved?'readonly':''}>${item.caption||''}</textarea>
    </div>

    <!-- Telugu caption -->
    <div class="card">
      <div class="label">Caption (Telugu) — tap to edit</div>
      <textarea id="caption-te" ${alreadyApproved?'readonly':''}>${item.caption_te||''}</textarea>
    </div>

    <!-- Price / offer -->
    ${!item.is_festival ? `
    <div class="card">
      <div class="label">💰 Price / Offer (optional — leave blank if none)</div>
      <input type="text" id="price-note" placeholder="e.g. Italian Marble from ₹85/sq.ft · Offer valid till 31 July">
    </div>` : ''}

    <!-- Actions -->
    ${!alreadyApproved ? `
    <button class="btn btn-approve" onclick="approve()">✅ Approve — Post on ${fmt(item.cal_date)}</button>
    <button class="btn btn-reject" onclick="reject()">❌ Reject — Regenerate</button>
    ` : ''}

    <div style="text-align:center;font-size:11px;color:#475569;margin-top:16px;padding-bottom:24px">
      V Wholesale Marketing · Auto-pipeline
    </div>
  `;
}

async function approve() {
  const btn = document.querySelector('.btn-approve');
  btn.disabled = true; btn.textContent = '⏳ Approving…';

  const data = await api({
    action: 'approve',
    token,
    edited_caption: document.getElementById('caption-en')?.value,
    edited_caption_te: document.getElementById('caption-te')?.value,
    edited_price_note: document.getElementById('price-note')?.value||''
  });

  if(data.ok) {
    document.getElementById('app').innerHTML = `
      <div class="success" style="margin-top:40px">
        <div style="font-size:40px;margin-bottom:16px">✅</div>
        <div style="font-size:18px;font-weight:900;margin-bottom:8px">Approved!</div>
        <div style="font-size:13px;color:#6ee7b7">${data.message}</div>
        <div style="font-size:11px;color:#064e3b;margin-top:12px">You can close this window</div>
      </div>`;
  } else {
    btn.disabled = false; btn.textContent = '✅ Approve';
    alert('Error: ' + (data.error||'Something went wrong'));
  }
}

async function reject() {
  const reason = prompt('Reason for rejection? (optional)');
  if(reason === null) return; // cancelled

  const btn = document.querySelector('.btn-reject');
  btn.disabled = true; btn.textContent = '⏳…';

  const data = await api({action:'reject',token,reason});
  if(data.ok) {
    document.getElementById('app').innerHTML = `
      <div class="error-box" style="margin-top:40px">
        <div style="font-size:40px;margin-bottom:16px">🔄</div>
        <div style="font-size:18px;font-weight:900;margin-bottom:8px">Rejected</div>
        <div style="font-size:13px;color:#fca5a5">Will regenerate tomorrow at 6am</div>
        <div style="font-size:11px;color:#450a0a;margin-top:12px">You can close this window</div>
      </div>`;
  } else {
    btn.disabled = false; btn.textContent = '❌ Reject';
    alert('Error: ' + (data.error||'Something went wrong'));
  }
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-box" style="margin-top:40px">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div style="font-weight:700;margin-bottom:6px">Link Invalid</div>
      <div style="font-size:13px;color:#fca5a5">${msg}</div>
      <div style="font-size:11px;color:#7f1d1d;margin-top:12px">Links expire after 48 hours</div>
    </div>`;
}

load();
</script>
</body>
</html>
