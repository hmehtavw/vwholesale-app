<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rate Your Visit — V Wholesale</title>
<style>
  :root {
    --gold: #C8972B;
    --gold-light: #EF9F27;
    --bg: #0d0d0d;
    --bg2: #161616;
    --bg3: #1f1f1f;
    --border: #2a2a2a;
    --text: #f0ede6;
    --text2: #b8b3a8;
    --text3: #7a766c;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
  }
  .logo-mark {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 20px; color: #1a1a1a;
    margin: 0 auto 16px;
  }
  h1 { font-size: 19px; font-weight: 700; margin-bottom: 4px; }
  .sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
  .stars { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
  .star-btn {
    background: none; border: none; font-size: 40px; cursor: pointer;
    color: var(--border); transition: transform 0.15s, color 0.15s; line-height: 1;
    padding: 4px;
  }
  .star-btn.active { color: var(--gold); transform: scale(1.1); }
  .rating-label { font-size: 13px; color: var(--text3); min-height: 18px; margin-bottom: 20px; }
  .form-group { text-align: left; margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
  textarea, input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 12px; color: var(--text); font-family: inherit;
    font-size: 14px; resize: vertical;
  }
  textarea:focus, input:focus { outline: none; border-color: var(--gold); }
  .btn-submit {
    width: 100%; background: var(--gold); color: #1a1a1a; border: none;
    border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 6px; transition: opacity 0.15s;
  }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-submit:active:not(:disabled) { opacity: 0.85; }
  .error-msg { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }
  .success-view { display: none; }
  .success-view .check {
    width: 64px; height: 64px; border-radius: 50%; background: rgba(34,197,94,0.15);
    display: flex; align-items: center; justify-content: center; font-size: 32px;
    margin: 0 auto 16px; color: var(--green);
  }
  .success-view h2 { font-size: 18px; margin-bottom: 8px; }
  .success-view p { font-size: 14px; color: var(--text2); line-height: 1.5; }
  .form-view.hidden, .success-view.shown { display: none; }
  .success-view.shown { display: block; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="form-view" id="form-view">
      <div class="logo-mark">VW</div>
      <h1 id="greeting">How was your visit?</h1>
      <p class="sub" id="subtext">We'd love to hear about your experience at V Wholesale.</p>

      <div class="stars" id="stars">
        <button class="star-btn" data-val="1">★</button>
        <button class="star-btn" data-val="2">★</button>
        <button class="star-btn" data-val="3">★</button>
        <button class="star-btn" data-val="4">★</button>
        <button class="star-btn" data-val="5">★</button>
      </div>
      <div class="rating-label" id="rating-label">Tap a star to rate</div>

      <div class="form-group">
        <label>What did you like? (optional)</label>
        <textarea id="positive" rows="2" placeholder="e.g. Great service, good prices"></textarea>
      </div>
      <div class="form-group">
        <label>Anything we can improve? (optional)</label>
        <textarea id="suggestion" rows="2" placeholder="Your suggestions help us get better"></textarea>
      </div>

      <button class="btn-submit" id="submit-btn" disabled>Submit Feedback</button>
      <p class="error-msg" id="error-msg"></p>
    </div>

    <div class="success-view" id="success-view">
      <div class="check">✓</div>
      <h2>Thank you!</h2>
      <p>Your feedback means a lot to us and helps us serve you better next time.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://ndamdnlsuktucqtcbhgp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_rowcFNrbdc8V0pJXJfUR_w_-bM5Ld3U';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const visitId = parseInt(params.get('visit'), 10) || null;
    const customerId = parseInt(params.get('customer'), 10) || null;
    const department = params.get('dept') || null;
    const name = params.get('name') || '';

    if (name) {
      document.getElementById('greeting').textContent = `How was your visit, ${decodeURIComponent(name)}?`;
    }

    let rating = 0;
    const labels = { 1: 'Poor', 2: 'Fair', 3: 'Good', 4: 'Very Good', 5: 'Excellent' };
    const starBtns = document.querySelectorAll('.star-btn');
    const ratingLabel = document.getElementById('rating-label');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');

    starBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        rating = parseInt(btn.dataset.val, 10);
        starBtns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.val, 10) <= rating));
        ratingLabel.textContent = labels[rating];
        submitBtn.disabled = false;
      });
    });

    submitBtn.addEventListener('click', async () => {
      if (!rating) return;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';
      errorMsg.style.display = 'none';

      try {
        const { error } = await sb.from('feedback').insert({
          visit_id: visitId,
          customer_id: customerId,
          rating,
          positive: document.getElementById('positive').value.trim() || null,
          suggestion: document.getElementById('suggestion').value.trim() || null,
          department
        });
        if (error) throw error;

        document.getElementById('form-view').classList.add('hidden');
        document.getElementById('success-view').classList.add('shown');
      } catch (e) {
        errorMsg.textContent = 'Could not submit — please try again in a moment.';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Feedback';
      }
    });
  </script>
</body>
</html>
