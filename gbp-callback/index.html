<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Connecting GBP…</title>
  <style>
    body{font-family:-apple-system,sans-serif;background:#0A1628;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .box{text-align:center;padding:40px}
    .spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,.3);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{color:#c9a84c;margin-bottom:8px}
    p{color:#94a3b8;font-size:14px}
    .err{color:#ef4444}
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="sp"></div>
    <h2 id="title">Connecting Google Business Profile…</h2>
    <p id="msg">Exchanging authorization code…</p>
  </div>
  <script>
    const SB = 'https://ndamdnlsuktucqtcbhgp.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kYW1kbmxzdWt0dWNxdGNiaGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTg1MzgsImV4cCI6MjA5Njk5NDUzOH0.7pGJu4bbNhl4E-4Do24jS9_p6nLUa1eN4JXQSqEF9VU';

    async function run() {
      const p = new URLSearchParams(window.location.search);
      const code = p.get('code'), state = p.get('state'), err = p.get('error');
      if (err) { show('Access Denied', err, 1); return red(); }
      if (!code || state !== 'gbp_oauth') { show('Invalid Callback', 'No code received', 1); return red(); }
      try {
        // Exchange via edge function (keeps secret server-side)
        let data = null;
        for (let i = 1; i <= 3; i++) {
          const res = await fetch(`${SB}/functions/v1/gbp-oauth`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': KEY },
            body: JSON.stringify({ action: 'exchange_code', code })
          });
          if (res.status === 404) { await new Promise(r => setTimeout(r, 2000 * i)); continue; }
          data = await res.json();
          break;
        }
        if (!data) throw new Error('Edge function unavailable — try again');
        if (!data.ok) throw new Error(data.error || 'Token exchange failed');
        show('Connected!', 'Redirecting to Marketing Portal…', 0);
        setTimeout(() => window.location.href = '/marketing/?gbp=connected', 1500);
      } catch(e) { show('Failed', e.message, 1); red(); }
    }

    function show(t, m, e) {
      document.getElementById('sp').style.display = e ? 'none' : 'block';
      const el = document.getElementById('title');
      el.textContent = (e ? '❌ ' : '✅ ') + t;
      el.className = e ? 'err' : '';
      document.getElementById('msg').textContent = m;
    }
    function red() { setTimeout(() => window.location.href = '/marketing/', 4000); }
    run();
  </script>
</body>
</html>
