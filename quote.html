<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1e3f">
<title>Quotation · V Wholesale</title>
<style>
  :root{ --navy:#0b1e3f; --gold:#e6b53c; --ink:#1a1a1a; --muted:#6b7280; --line:#e5e7eb; --bg:#f4f5f7; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
        background:var(--bg); color:var(--ink); line-height:1.45; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:760px; margin:0 auto; padding:14px; }
  .card{ background:#fff; border-radius:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; margin-bottom:12px; }
  .top{ background:var(--navy); color:#fff; padding:18px 18px 14px; display:flex; align-items:center; gap:12px; }
  .logo{ width:46px; height:46px; border-radius:10px; background:var(--gold); color:var(--navy);
         font-weight:800; font-size:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .brand b{ font-size:17px; letter-spacing:.2px; }
  .brand div{ font-size:12px; opacity:.8; }
  .lang-bar{ display:flex; gap:6px; padding:10px 18px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .lang-btn{ padding:3px 10px; border-radius:14px; border:1px solid var(--line); font-size:12px; cursor:pointer;
             background:#fff; color:var(--muted); font-weight:600; transition:.15s; }
  .lang-btn.active{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .meta{ padding:14px 18px; border-bottom:1px solid var(--line); display:flex; flex-wrap:wrap; gap:10px 26px; }
  .meta .lbl{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .meta .val{ font-size:14px; font-weight:600; }
  .sec-title{ font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
              padding:14px 18px 6px; font-weight:700; }
  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.3px;
      padding:8px 18px; border-bottom:1px solid var(--line); }
  th.num,td.num{ text-align:right; }
  td{ padding:10px 18px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:top; }
  .desc b{ font-size:13.5px; }
  .desc small{ display:block; color:var(--muted); font-size:11.5px; margin-top:1px; }
  .totals{ padding:12px 18px; }
  .totals .row{ display:flex; justify-content:space-between; font-size:13px; padding:3px 0; color:var(--muted); }
  .grand{ display:flex; justify-content:space-between; align-items:center; margin-top:8px; padding-top:10px;
          border-top:2px solid var(--navy); }
  .grand span{ font-size:14px; font-weight:700; }
  .grand b{ font-size:22px; color:var(--navy); }
  .note{ padding:12px 18px; font-size:12px; color:var(--muted); border-top:1px solid var(--line); }
  .terms{ padding:10px 18px 16px; font-size:12px; color:var(--muted); white-space:pre-wrap; }
  .foot{ text-align:center; padding:14px; font-size:12px; color:var(--muted); }
  .foot a{ color:var(--navy); font-weight:600; text-decoration:none; }
  .bar{ position:sticky; bottom:0; display:flex; gap:10px; padding:12px 14px;
        background:linear-gradient(to top, var(--bg) 70%, transparent); }
  .btn{ flex:1; padding:13px; border-radius:11px; border:none; font-size:14px; font-weight:700; cursor:pointer; }
  .btn.print{ background:var(--navy); color:#fff; }
  .btn.call{ background:#25D366; color:#fff; text-decoration:none; text-align:center; line-height:1.4; display:block; }
  .state{ text-align:center; padding:60px 20px; color:var(--muted); }
  .spin{ width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--navy);
         border-radius:50%; margin:0 auto 14px; animation:s 0.8s linear infinite; }
  @keyframes s{ to{ transform:rotate(360deg); } }
  .tile-room{ padding:12px 18px; border-bottom:1px solid var(--line); }
  .tile-room-name{ font-size:13px; font-weight:700; margin-bottom:4px; }
  .tile-room-detail{ font-size:12px; color:var(--muted); }
  .tile-room-tile{ font-size:12px; color:var(--ink); margin-top:4px; }
  .badge{ display:inline-block; background:rgba(230,181,60,.15); color:#a07a10;
          border-radius:6px; padding:2px 7px; font-size:10px; font-weight:700; margin-top:4px; }
  @media print{
    body{ background:#fff; } .bar,.lang-bar{ display:none; } .card{ box-shadow:none; border-radius:0; }
    .top{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }

// ── Language detection ────────────────────────────────────
const LANGS = [{code:'en',label:'English'},{code:'te',label:'తెలుగు'},{code:'hi',label:'हिंदी'},{code:'bn',label:'বাংলা'},{code:'or',label:'ଓଡ଼ିଆ'}];
let _lang = (new URLSearchParams(location.search).get('lang')) ||
  (['te','hi','bn','or'].find(l => (navigator.language||'').toLowerCase().startsWith(l))) || 'en';

const t = k => (TR[_lang]||TR.en)[k] || TR.en[k] || k;
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const inr = n => '₹' + Math.round(Number(n)||0).toLocaleString('en-IN');

// ── Helpers ───────────────────────────────────────────────
function getRef(){ const p = new URLSearchParams(location.search); return p.get('quote')||p.get('ref')||p.get('q')||''; }

function msg(html){
  return `<div class="card"><div class="state" style="color:#1a1a1a">${html}</div></div>
    <div class="foot">${STORE}, Vijayawada · <a href="tel:${STORE_PHONE}">${STORE_PHONE}</a></div>`;
}

function langBar(active){
  return `<div class="lang-bar">${LANGS.map(l=>`<button class="lang-btn${l.code===active?' active':''}" onclick="switchLang('${l.code}')">${l.label}</button>`).join('')}</div>`;
}

window.switchLang = function(code){
  _lang = code;
  const url = new URL(location.href);
  url.searchParams.set('lang', code);
  history.replaceState(null,'',url);
  if(window._lastQ) render(window._lastQ);
};

// ── Load ──────────────────────────────────────────────────
async function load(){
  document.getElementById('loading-text').textContent = t('loading');
  const ref = getRef();
  const el = document.getElementById('content');
  if(!ref){ el.innerHTML = msg(t('no_ref')); return; }
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_quotation`, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY},
      body: JSON.stringify({ref: String(ref)})
    });
    const txt = await res.text();
    let data = null;
    try{ data = JSON.parse(txt); }catch(_){}
    if(!res.ok){ el.innerHTML = msg(`${t('error')}<br><small style="opacity:.6">${esc((txt||'').slice(0,180))}</small>`); return; }
    const q = Array.isArray(data) ? data[0] : (data&&(data.id||data.tq_no) ? data : null);
    if(!q){ el.innerHTML = msg(t('not_found')); return; }
    window._lastQ = q;
    render(q);
  }catch(e){
    document.getElementById('content').innerHTML = msg(`${t('error')}<br><small style="opacity:.6">${esc(String((e&&e.message)||e))}</small>`);
  }
}

// ── Render ────────────────────────────────────────────────
function render(q){
  const isTQ = !!(q.tq_no || q.rooms);
  document.getElementById('content').innerHTML = isTQ ? renderTQ(q) : renderGeneral(q);
  document.getElementById('bar')?.removeAttribute('hidden');
  document.querySelector('.btn.save-pdf').textContent = t('save_pdf');
  document.querySelector('.btn.call').textContent = t('call_order');
}

function header(q, quoteNo, date){
  return `<div class="top">
    <div class="logo">VW</div>
    <div class="brand"><b>${STORE}</b><div>Vijayawada · Home Building &amp; Improvement</div></div>
  </div>
  ${langBar(_lang)}
  <div class="meta">
    <div><div class="lbl">${t('quotation')}</div><div class="val">${esc(quoteNo)}</div></div>
    ${date?`<div><div class="lbl">${t('date')}</div><div class="val">${esc(date)}</div></div>`:''}
    <div><div class="lbl">${t('customer')}</div><div class="val">${esc(q.customer_name||'Customer')}</div></div>
    ${q.customer_phone||q.phone?`<div><div class="lbl">${t('contact')}</div><div class="val">${esc(q.customer_phone||q.phone)}</div></div>`:''}
    ${q.site_address||q.address?`<div style="flex-basis:100%"><div class="lbl">${t('site')}</div><div class="val">${esc(q.site_address||q.address)}</div></div>`:''}
  </div>`;
}

// General quotation render
function renderGeneral(q){
  const items = Array.isArray(q.items) ? q.items : [];
  const date = (q.date||q.created_at||'').slice(0,10);
  const validity = q.validity_days || 7;
  let computed = 0;
  const rows = items.map(it => {
    const desc = it.description||it.name||it.model||'Item';
    const sub = [it.brand,it.model].filter(Boolean).join(' · ');
    const qty = it.qty!=null?it.qty:(it.quantity!=null?it.quantity:'');
    const unit = it.unit||'';
    const rate = it.netPrice!=null?it.netPrice:(it.rate!=null?it.rate:(it.price!=null?it.price:''));
    const total = it.total!=null?it.total:((Number(rate)||0)*(Number(qty)||0));
    computed += Number(total)||0;
    return `<tr><td class="desc"><b>${esc(desc)}</b>${sub?`<small>${esc(sub)}</small>`:''}</td>
      <td class="num">${esc(qty)}${unit?' '+esc(unit):''}</td>
      <td class="num">${rate!==''?inr(rate):'—'}</td>
      <td class="num"><b>${inr(total)}</b></td></tr>`;
  }).join('');
  const grand = q.grand_total!=null?q.grand_total:computed;
  return `<div class="card">
    ${header(q, q.quote_no||q.id||'', date)}
    <div class="sec-title">${t('items')}</div>
    <table><thead><tr>
      <th>${t('description')}</th><th class="num">${t('qty')}</th>
      <th class="num">${t('rate')}</th><th class="num">${t('amount')}</th>
    </tr></thead><tbody>${rows||`<tr><td colspan="4" style="color:#6b7280">${t('no_items')}</td></tr>`}</tbody></table>
    <div class="totals"><div class="grand"><span>${t('grand_total')}</span><b>${inr(grand)}</b></div></div>
    <div class="note">📋 ${t('validity').replace('{n}',validity)}</div>
    ${q.terms?`<div class="terms"><b style="color:#1a1a1a">${t('terms')}</b>\n${esc(q.terms)}</div>`:''}
  </div>
  <div class="foot">${t('call_us')}<br><a href="tel:${STORE_PHONE}">${STORE} · ${STORE_PHONE}</a></div>`;
}

// Tile quotation render
function renderTQ(q){
  const date = (q.created_at||'').slice(0,10);
  const rooms = Array.isArray(q.rooms) ? q.rooms : [];
  const tileSelections = q.tile_selections || {};
  const priceSqft = parseFloat(q.quoted_price_per_sqft||0);
  const totalSqft = parseFloat(q.total_area_sqft||0);
  const totalBoxes = parseInt(q.total_boxes||0);
  const grand = q.grand_total || (priceSqft>0&&totalSqft>0 ? Math.round(priceSqft*totalSqft) : 0);

  // Build room rows
  const roomRows = rooms.map(r => {
    const areas = Array.isArray(r.areas) ? r.areas : [];
    const sqft = areas.reduce((s,a)=>s+(parseFloat(a.sqft)||0),0);
    // Find tile selections for this room's slots
    const floorSel = tileSelections[r.id+'_floor'] || tileSelections[r.id] || {};
    const wallSel = tileSelections[r.id+'_wall'] || {};
    const floorTile = floorSel.tile_name || floorSel.name || '';
    const floorSize = floorSel.size?.mm || floorSel.size || '';
    const wallTile = wallSel.tile_name || wallSel.name || '';
    const wallSize = wallSel.size?.mm || wallSel.size || '';
    return `<div class="tile-room">
      <div class="tile-room-name">${esc(r.label||r.type||'Room')}</div>
      <div class="tile-room-detail">${sqft.toFixed(1)} sqft</div>
      ${floorTile?`<div class="tile-room-tile">🔲 ${esc(floorTile)}${floorSize?' · '+esc(floorSize)+'mm':''}</div>`:''}
      ${wallTile?`<div class="tile-room-tile">🧱 ${esc(wallTile)}${wallSize?' · '+esc(wallSize)+'mm':''}</div>`:''}
    </div>`;
  }).join('');

  return `<div class="card">
    ${header(q, q.tq_no||q.id||'', date)}
    ${rooms.length?`<div class="sec-title">${t('rooms')}</div>${roomRows}`:''}
    <div class="totals">
      ${totalSqft>0?`<div class="row"><span>${t('total_sqft')}</span><span>${totalSqft.toFixed(1)} sqft</span></div>`:''}
      ${totalBoxes>0?`<div class="row"><span>${t('total_boxes')}</span><span>${totalBoxes} ${t('boxes')}</span></div>`:''}
      ${priceSqft>0?`<div class="row"><span>${t('price_sqft')}</span><span>${inr(priceSqft)}</span></div>`:''}
      ${grand>0?`<div class="grand"><span>${t('grand_total')}</span><b>${inr(grand)}</b></div>`:''}
    </div>
    <div class="note">📋 ${t('validity').replace('{n}',30)}</div>
  </div>
  <div class="foot">${t('call_us')}<br><a href="tel:${STORE_PHONE}">${STORE} · ${STORE_PHONE}</a></div>`;
}

load();
</script>
