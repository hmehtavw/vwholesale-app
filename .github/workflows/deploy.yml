name: Deploy V Wholesale Customer OS

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'staff.html'
      - 'shop.html'
      - 'professional.html'
      - 'admin.html'
      - 'modules/**'
      - 'sw.js'
      - 'manifest.json'
      - 'about.html'
      - 'contact.html'
      - 'privacy.html'
      - 'terms.html'
      - 'refund.html'
      - 'shipping.html'
      - 'icon-192.png'
      - 'icon-512.png'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin main:gh-pages --force
          echo "✅ gh-pages updated to $(git rev-parse --short HEAD)"
