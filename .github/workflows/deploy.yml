name: Deploy V Wholesale Customer OS

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'modules/**'
      - 'sw.js'
      - 'manifest.json'
      - 'shop.html'
      - 'about.html'
      - 'contact.html'
      - 'privacy.html'
      - 'terms.html'
      - 'refund.html'
      - 'shipping.html'
      - 'icon-192.png'
      - 'icon-512.png'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait and retry if failed
        if: steps.deployment1.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment2
        if: steps.deployment1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait and retry again if still failed
        if: steps.deployment2.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment3
        if: steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Report final URL
        if: always()
        run: |
          if [ "${{ steps.deployment1.outcome }}" = "success" ]; then
            echo "✅ Deployed on attempt 1"
          elif [ "${{ steps.deployment2.outcome }}" = "success" ]; then
            echo "✅ Deployed on attempt 2"
          else
            echo "✅ Deployed on attempt 3"
          fi
