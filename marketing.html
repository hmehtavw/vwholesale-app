<!DOCTYPE html>
<!-- build:marketing-v1 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>V Wholesale — Marketing Intelligence</title>
  <link rel="icon" href="./icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0A0F1E;
      --bg2:     #111827;
      --bg3:     #1F2937;
      --border:  #1F2937;
      --border2: #374151;
      --text:    #F9FAFB;
      --text2:   #D1D5DB;
      --text3:   #6B7280;
      --blue:    #3B82F6;
      --green:   #10B981;
      --gold:    #F59E0B;
      --red:     #EF4444;
      --purple:  #8B5CF6;
      --pink:    #EC4899;
      --sidebar-w: 240px;
      --topbar-h: 56px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; }

    /* ── LAYOUT ── */
    #mkt-layout { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    #mkt-sidebar {
      width: var(--sidebar-w); min-height: 100vh;
      background: #080D1A; border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
      overflow-y: auto;
    }
    .mkt-logo {
      padding: 16px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .mkt-logo-icon {
      width: 32px; height: 32px; background: var(--purple);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .mkt-logo-text { font-size: 13px; font-weight: 800; color: var(--text); }
    .mkt-logo-sub { font-size: 10px; color: var(--text3); }
    .mkt-nav { flex: 1; padding: 8px 0; }
    .mkt-section-lbl {
      font-size: 9px; font-weight: 800; color: var(--text3);
      text-transform: uppercase; letter-spacing: .08em;
      padding: 12px 16px 4px;
    }
    .mkt-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; cursor: pointer; border: none;
      background: none; color: var(--text2); font-family: inherit;
      font-size: 13px; width: 100%; text-align: left;
      border-radius: 0; transition: all .15s;
      position: relative;
    }
    .mkt-nav-item:hover { background: var(--bg2); color: var(--text); }
    .mkt-nav-item.active { background: rgba(139,92,246,.15); color: var(--purple); border-right: 2px solid var(--purple); }
    .mkt-nav-item .nav-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
    .mkt-nav-badge {
      margin-left: auto; background: var(--red); color: #fff;
      font-size: 9px; font-weight: 800; padding: 1px 5px;
      border-radius: 8px; min-width: 16px; text-align: center;
    }
    .mkt-footer {
      padding: 12px 16px; border-top: 1px solid var(--border);
      font-size: 11px;
    }
    .ai-pause-btn {
      width: 100%; padding: 8px; background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3); border-radius: 8px;
      color: var(--red); font-size: 11px; font-weight: 700;
      cursor: pointer; font-family: inherit; margin-bottom: 8px;
    }
    .ai-pause-btn.paused { background: rgba(239,68,68,.3); }

    /* ── MAIN ── */
    #mkt-main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── TOPBAR ── */
    #mkt-topbar {
      height: var(--topbar-h); background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: sticky; top: 0; z-index: 50;
    }
    .mkt-page-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .mkt-topbar-actions { display: flex; align-items: center; gap: 10px; }
    .mkt-btn { padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700; }
    .mkt-btn-primary { background: var(--purple); color: #fff; }
    .mkt-btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

    /* ── CONTENT ── */
    #mkt-content { flex: 1; padding: 20px; overflow-y: auto; }

    /* ── CARDS ── */
    .mkt-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 12px;
    }
    .mkt-card-title { font-size: 12px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 12px; }
    .mkt-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mkt-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .mkt-grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }

    /* ── STAT CARDS ── */
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
    }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 2px; }
    .stat-sub { font-size: 11px; color: var(--text3); }
    .stat-trend-up { color: var(--green); }
    .stat-trend-down { color: var(--red); }

    /* ── BADGES ── */
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; }
    .badge-green { background: rgba(16,185,129,.15); color: var(--green); }
    .badge-blue { background: rgba(59,130,246,.15); color: var(--blue); }
    .badge-gold { background: rgba(245,158,11,.15); color: var(--gold); }
    .badge-red { background: rgba(239,68,68,.15); color: var(--red); }
    .badge-purple { background: rgba(139,92,246,.15); color: var(--purple); }
    .badge-gray { background: var(--bg3); color: var(--text3); }

    /* ── AGENT STATUS ── */
    .agent-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .agent-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .agent-name { font-size: 13px; font-weight: 700; }
    .agent-desc { font-size: 11px; color: var(--text3); }

    /* ── INTEGRATION STATUS ── */
    .integration-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .integration-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); }
    .dot-gold { background: var(--gold); }
    .dot-gray { background: var(--text3); }
    .dot-red { background: var(--red); }

    /* ── LOGIN ── */
    #mkt-login {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .login-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; width: 360px;
    }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo-icon { width: 56px; height: 56px; background: var(--purple); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 10px; }
    .login-title { font-size: 18px; font-weight: 900; }
    .login-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .login-form { display: grid; gap: 12px; }
    .login-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 4px; }
    .login-input { width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px; }
    .login-input:focus { outline: none; border-color: var(--purple); }
    .login-btn { width: 100%; padding: 12px; background: var(--purple); color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; }
    .login-err { font-size: 12px; color: var(--red); text-align: center; display: none; }

    /* ── EMPTY STATE ── */
    .mkt-empty { text-align: center; padding: 40px 20px; color: var(--text3); }
    .mkt-empty-icon { font-size: 40px; margin-bottom: 10px; }
    .mkt-empty-title { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 4px; }

    /* ── TABLE ── */
    .mkt-table { width: 100%; border-collapse: collapse; }
    .mkt-table th { font-size: 10px; font-weight: 800; color: var(--text3); text-transform: uppercase; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .mkt-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
    .mkt-table tr:hover td { background: var(--bg3); }

    /* ── TABS ── */
    .mkt-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
    .mkt-tab { padding: 8px 16px; background: none; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .mkt-tab.active { color: var(--purple); border-bottom-color: var(--purple); }

    /* ── AI CHAT ── */
    .ai-message { padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; }
    .ai-message.ai { background: rgba(139,92,246,.1); border: 1px solid rgba(139,92,246,.2); }
    .ai-message.user { background: var(--bg3); border: 1px solid var(--border2); }
    .ai-thinking { display: flex; gap: 4px; align-items: center; padding: 10px; }
    .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); animation: pulse 1.2s infinite; }
    .ai-dot:nth-child(2) { animation-delay: .2s; }
    .ai-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* ── FORM ── */
    .mkt-form-group { margin-bottom: 12px; }
    .mkt-form-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 4px; }
    .mkt-form-input, .mkt-form-select, .mkt-form-textarea {
      width: 100%; padding: 9px 12px; background: var(--bg3);
      border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-family: inherit; font-size: 13px;
    }
    .mkt-form-input:focus, .mkt-form-select:focus, .mkt-form-textarea:focus {
      outline: none; border-color: var(--purple);
    }
    .mkt-form-textarea { resize: vertical; min-height: 80px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      #mkt-sidebar { transform: translateX(-100%); transition: transform .25s; }
      #mkt-sidebar.open { transform: translateX(0); }
      #mkt-main { margin-left: 0; }
      .mkt-grid-4 { grid-template-columns: 1fr 1fr; }
      .mkt-grid-3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIG ──
const MKT_SB_URL = 'https://ndamdnlsuktucqtcbhgp.supabase.co';
const MKT_SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kYW1kbmxzdWt0dWNxdGNiaGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTg1MzgsImV4cCI6MjA5Njk5NDUzOH0.7pGJu4bbNhl4E-4Do24jS9_p6nLUa1eN4JXQSqEF9VU';
const sb = supabase.createClient(MKT_SB_URL, MKT_SB_KEY);
let mktProfile = null;
let aiPaused = false;

// ── AUTH ──
async function mktLogin() {
  const phone = document.getElementById('mkt-phone').value.trim();
  const pin = document.getElementById('mkt-pin').value.trim();
  const errEl = document.getElementById('mkt-login-err');
  errEl.style.display = 'none';

  if (!phone || phone.length < 10) { errEl.textContent = 'Enter valid phone number'; errEl.style.display = 'block'; return; }
  if (!pin || pin.length < 6) { errEl.textContent = 'Enter 6-digit PIN'; errEl.style.display = 'block'; return; }

  const { error } = await sb.auth.signInWithPassword({ email: phone + '@vwholesale.app', password: pin });
  if (error) { errEl.textContent = 'Invalid credentials — ' + (error.message||'check phone and PIN'); errEl.style.display = 'block'; return; }

  // Fix: use .then() not .catch() on Supabase thenable
  const profileRes = await sb.from('profiles').select('*').eq('phone', phone).single().then(r=>r, ()=>({data:null}));
  const profile = profileRes?.data;

  // Allow admin, owner, manager, marketing roles
  const ALLOWED = ['admin','owner','manager','marketing','store_manager','floor_manager','sales_head'];
  if (!profile) {
    await sb.auth.signOut();
    errEl.textContent = 'Profile not found. Contact admin.';
    errEl.style.display = 'block';
    return;
  }
  if (!ALLOWED.includes(profile.role)) {
    await sb.auth.signOut();
    errEl.textContent = 'No marketing access for role: ' + profile.role;
    errEl.style.display = 'block';
    return;
  }

  mktProfile = profile;
  showMktApp();
}

function showMktApp() {
  document.getElementById('mkt-login').style.display = 'none';
  document.getElementById('mkt-layout').style.display = 'flex';
  document.getElementById('mkt-user-info').textContent = mktProfile?.name + ' · ' + (mktProfile?.role || '');
  startClock();
  loadAIPauseStatus();
  mktNav('command');
}

async function mktSignOut() {
  await sb.auth.signOut();
  window.location.reload();
}

// ── CLOCK ──
function startClock() {
  const el = document.getElementById('mkt-time');
  const tick = () => { el.textContent = new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',hour12:true}); };
  tick(); setInterval(tick, 30000);
}

// ── NAVIGATION ──
const PAGE_TITLES = {
  command: 'Command Centre', cmo: 'AI CMO', campaigns: 'Campaigns',
  content: 'Content Studio', calendar: 'Content Calendar', approvals: 'Approvals',
  social: 'Social Media', gbp: 'Google Business Profile', whatsapp: 'WhatsApp',
  ads: 'Advertising', 'local-seo': 'Local SEO', 'website-seo': 'Website SEO',
  reviews: 'Reviews & Reputation', analytics: 'Analytics', competitors: 'Competitor Intelligence',
  segments: 'Customer Segments', agents: 'AI Agents', brand: 'Brand Knowledge',
  integrations: 'Integrations', audit: 'Audit Logs', settings: 'Settings'
};

function mktNav(page) {
  document.querySelectorAll('.mkt-nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  document.getElementById('mkt-page-title').textContent = PAGE_TITLES[page] || page;
  const renderers = {
    poster: renderPosterStudio, command: renderCommandCentre, cmo: renderAICMO, campaigns: renderCampaigns,
    content: renderContentStudio, calendar: renderCalendar, approvals: renderApprovals,
    social: renderSocial, gbp: renderGBP, whatsapp: renderWhatsApp,
    ads: renderAds, 'local-seo': renderLocalSEO, 'website-seo': renderWebsiteSEO,
    reviews: renderReviews, analytics: renderAnalytics, competitors: renderCompetitors,
    segments: renderSegments, agents: renderAgents, 'brand-profile': renderBrandProfile, brand: renderBrand,
    integrations: renderIntegrations, audit: renderAudit, settings: renderSettings
  };
  if (renderers[page]) renderers[page]();
  else renderComingSoon(PAGE_TITLES[page] || page);
}

function setContent(html) { document.getElementById('mkt-content').innerHTML = html; }

function renderComingSoon(title) {
  setContent(`<div class="mkt-empty">
    <div class="mkt-empty-icon">🚧</div>
    <div class="mkt-empty-title">${title}</div>
    <div style="font-size:12px;margin-top:4px">Coming in next build</div>
  </div>`);
}

async function runAICMO() {
  if (aiPaused) { alert('AI actions are paused. Resume first.'); return; }

  const outputEl = document.getElementById('cmo-output');
  if (outputEl) {
    outputEl.innerHTML = `<div class="ai-thinking"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span style="font-size:12px;color:var(--text3);margin-left:8px">AI CMO is analysing your business data…</span></div>`;
  }

  // Gather business context
  const [products, campaigns, integrations] = await Promise.all([
    sb.from('products').select('id,name,category,stock,price').limit(20).then(r=>r.data||[], ()=>[]),
    sb.from('marketing_campaigns').select('*').limit(5).then(r=>r.data||[], ()=>[]),
    sb.from('marketing_integrations').select('name,status').then(r=>r.data||[], ()=>[]),
  ]);

  const context = {
    business: 'V Wholesale — Omnichannel home building store, Vijayawada, Andhra Pradesh',
    website: 'https://vwholesale.in (just launched)',
    monthly_budget_inr: 30000,
    primary_goals: ['Store walk-ins', 'Quotations', 'GBP visibility', 'Contractor Club growth'],
    priority_channels: ['Website SEO', 'Google Business Profile', 'WhatsApp', 'Instagram', 'Reels'],
    languages: ['Telugu (primary)', 'English', 'Hindi'],
    target_locations: ['Vijayawada', 'Guntur', 'Mangalagiri', 'Tenali', 'Eluru'],
    product_categories: ['Tiles', 'Sanitaryware', 'Granite', 'Paints', 'Electricals', 'Plumbing'],
    total_products: products.length,
    integrations_status: integrations,
    active_campaigns: campaigns.length,
    date: new Date().toLocaleDateString('en-IN'),
  };

  try {
    const res = await fetch(`${MKT_SB_URL}/functions/v1/marketing-ai`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': MKT_SB_KEY },
      body: JSON.stringify({
        action: 'weekly_briefing',
        agent: 'AI CMO',
        model: 'gpt-4o-mini',
        prompt: `You are the AI CMO for V Wholesale, a home building superstore in Vijayawada, Andhra Pradesh.

Your role: Analyse current business context and produce a structured weekly marketing briefing.

STRICT RULES:
- Only recommend actions based on facts provided
- Never invent data, sales figures, or customer testimonials
- Always specify approval level needed (recommend/draft/approve/auto)
- Focus on local Vijayawada market
- Prioritise Telugu language content for local channels

Respond ONLY in this JSON format:
{
  "summary": "2-3 sentence overview of current marketing situation",
  "top_priorities": ["priority 1", "priority 2", "priority 3"],
  "weekly_actions": [
    {"action": "action description", "channel": "channel name", "effort": "low/medium/high", "impact": "low/medium/high", "approval": "auto/draft/approve", "reason": "why this matters"}
  ],
  "content_ideas": [
    {"type": "post/reel/story", "platform": "Instagram/GBP/WhatsApp", "topic": "topic", "language": "en/te/hi", "hook": "opening line idea"}
  ],
  "risks": ["risk 1", "risk 2"],
  "opportunities": ["opportunity 1", "opportunity 2"],
  "budget_recommendation": {"gbp_boost": 0, "meta_ads": 0, "google_ads": 0, "reason": "rationale"}
}`,
        context
      })
    });

    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    const output = data.output;
    if (outputEl) {
      outputEl.innerHTML = `
      <div style="display:grid;gap:12px">

        <div class="ai-message ai">
          <div style="font-size:10px;font-weight:700;color:var(--purple);margin-bottom:6px">🧠 AI CMO WEEKLY BRIEFING · ${new Date().toLocaleDateString('en-IN')}</div>
          <div style="font-size:13px;line-height:1.7">${output.summary || 'Analysis complete.'}</div>
        </div>

        <div class="mkt-grid-2">
          <div class="mkt-card" style="margin:0">
            <div class="mkt-card-title">🎯 Top Priorities</div>
            ${(output.top_priorities||[]).map((p,i) => `<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--purple);font-weight:800">${i+1}</span>${p}</div>`).join('')}
          </div>
          <div class="mkt-card" style="margin:0">
            <div class="mkt-card-title">💡 Opportunities</div>
            ${(output.opportunities||[]).map(o => `<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--border)">• ${o}</div>`).join('')}
            <div class="mkt-card-title" style="margin-top:12px">⚠️ Risks</div>
            ${(output.risks||[]).map(r => `<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--red)">• ${r}</div>`).join('')}
          </div>
        </div>

        <div class="mkt-card" style="margin:0">
          <div class="mkt-card-title">📋 This Week's Actions</div>
          <div style="display:grid;gap:8px">
            ${(output.weekly_actions||[]).map(a => `
            <div style="display:flex;gap:12px;align-items:flex-start;padding:10px;background:var(--bg3);border-radius:8px">
              <div style="flex:1">
                <div style="font-size:12px;font-weight:700">${a.action}</div>
                <div style="font-size:11px;color:var(--text3);margin-top:2px">${a.channel} · ${a.reason}</div>
              </div>
              <div style="display:flex;gap:4px;flex-shrink:0">
                <span class="badge badge-blue">${a.impact} impact</span>
                <span class="badge ${a.approval==='auto'?'badge-green':a.approval==='draft'?'badge-blue':'badge-gold'}">${a.approval}</span>
              </div>
            </div>`).join('')}
          </div>
        </div>

        <div class="mkt-card" style="margin:0">
          <div class="mkt-card-title">💡 Content Ideas This Week</div>
          <div style="display:grid;gap:6px">
            ${(output.content_ideas||[]).map(c => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg3);border-radius:8px">
              <span class="badge badge-purple">${c.platform}</span>
              <span class="badge badge-gray">${c.type}</span>
              <span class="badge ${c.language==='te'?'badge-gold':c.language==='hi'?'badge-blue':'badge-gray'}">${c.language}</span>
              <div style="flex:1;font-size:12px"><strong>${c.topic}</strong> — "${c.hook}"</div>
              <button class="mkt-btn mkt-btn-ghost" onclick="draftContent('${c.type}','${c.platform}','${c.topic.replace(/'/g,"\\'")}','${c.language}')" style="font-size:10px;padding:4px 8px">Draft →</button>
            </div>`).join('')}
          </div>
        </div>

        <div style="font-size:10px;color:var(--text3);text-align:center;padding:8px">
          Generated by AI CMO · ${data.model} · $${(data.cost_usd||0).toFixed(4)} · ${data.duration_ms}ms
        </div>
      </div>`;
    }

  } catch(e) {
    if (outputEl) outputEl.innerHTML = `<div style="color:var(--red);padding:16px;text-align:center">
      <div style="font-size:20px;margin-bottom:8px">⚠️</div>
      <div style="font-weight:700">AI CMO Error</div>
      <div style="font-size:12px;margin-top:4px">${e.message}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px">Make sure OpenAI API key is set in Supabase Edge Function secrets</div>
    </div>`;
  }
}

async function saveBrandProfile() {
  const payload = {
    business_name: document.getElementById('bp-name')?.value,
    tagline: document.getElementById('bp-tag')?.value,
    phone: document.getElementById('bp-phone')?.value,
    website: document.getElementById('bp-web')?.value,
    address: document.getElementById('bp-addr')?.value,
    primary_color: document.getElementById('bp-primary')?.value,
    secondary_color: document.getElementById('bp-secondary')?.value,
    updated_at: new Date().toISOString()
  };
  const {data:existing} = await sb.from('brand_profile').select('id').limit(1).then(r=>r,()=>({data:[]}));
  if ((existing||[]).length) {
    await sb.from('brand_profile').update(payload).eq('id',(existing||[])[0].id);
  } else {
    await sb.from('brand_profile').insert(payload);
  }
  showMktToast('✅ Brand profile saved');
  await sb.from('marketing_audit_logs').insert({action:'brand_profile_updated',performed_by:mktProfile?.name,performed_by_type:'human'});
}

async function uploadBrandPhotos(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  showMktToast('Uploading photos…');
  const {data:existing} = await sb.from('brand_profile').select('id,brand_photos').limit(1).then(r=>r,()=>({data:[]}));
  const bp = (existing||[])[0];
  const photos = [...(bp?.brand_photos||[])];

  for (const file of files) {
    if (file.size > 5*1024*1024) { showMktToast('Max 5MB per photo'); continue; }
    const ext = file.name.split('.').pop();
    const path = `brand-photos/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const {error} = await sb.storage.from('brand-assets').upload(path, file, {upsert:true});
    if (error) { showMktToast('Upload failed: '+error.message); continue; }
    const {data:{publicUrl}} = sb.storage.from('brand-assets').getPublicUrl(path);
    photos.push(publicUrl);
  }

  if (bp?.id) {
    await sb.from('brand_profile').update({brand_photos:photos}).eq('id',bp.id);
  } else {
    await sb.from('brand_profile').insert({brand_photos:photos});
  }
  showMktToast(`✅ ${files.length} photo(s) uploaded`);
  renderBrandProfile();
}

async function removePhoto(index) {
  const {data:existing} = await sb.from('brand_profile').select('id,brand_photos').limit(1).then(r=>r,()=>({data:[]}));
  const bp = (existing||[])[0];
  if (!bp) return;
  const photos = [...(bp.brand_photos||[])];
  photos.splice(index,1);
  await sb.from('brand_profile').update({brand_photos:photos}).eq('id',bp.id);
  renderBrandProfile();
}

async function loadAIPauseStatus() {
  const { data } = await sb.from('marketing_settings').select('value').eq('key','global_ai_pause').single().then(r=>r, ()=>({data:null}));

    btn.textContent = aiPaused ? '▶ Resume AI Actions' : '🛑 Pause All AI Actions';

async function toggleAIPause() {

async function generateGBPPost() {
  const type = document.getElementById('gbp-type').value;
  const lang = document.getElementById('gbp-lang').value;
  const topic = document.getElementById('gbp-topic').value;
  const cta = document.getElementById('gbp-cta').value;
  if (!topic) { showMktToast('Enter a topic first'); return; }

  const outputEl = document.getElementById('gbp-output');
  outputEl.innerHTML = '<div class="mkt-card"><div class="ai-thinking"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span style="font-size:12px;color:var(--text3);margin-left:8px">Writing GBP post…</span></div></div>';

  const langMap = {te:'Telugu',en:'English','te+en':'bilingual Telugu and English'};
  try {
    const res = await fetch(MKT_SB_URL+'/functions/v1/marketing-ai', {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':MKT_SB_KEY},
      body: JSON.stringify({
        action:'gbp_post', agent:'GBP Agent', model:'gpt-4o-mini',
        prompt:`You are creating a Google Business Profile post for V Wholesale, Vijayawada.

Post type: ${type}
Language: ${langMap[lang]}
Topic: ${topic}
CTA: ${cta}

RULES:
- Max 1500 characters for GBP posts
- V Wholesale, NH65 Bhavanipuram, Vijayawada | 8712697930 | vwholesale.in
- Natural, local tone — not corporate
- Telugu should feel like a local Vijayawada person wrote it
- Never invent prices or discounts not specified

Respond ONLY in this JSON:
{
  "post_text": "the full GBP post text ready to copy-paste",
  "char_count": 0,
  "photo_suggestion": "what photo to use",
  "best_time_to_post": "best day and time",
  "notes": "any tips"
}`,
        context:{topic, type, lang, cta}
      })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    const p = data.output;

    outputEl.innerHTML = `
    <div class="mkt-card" style="border:1px solid rgba(16,185,129,.3);margin-top:4px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div class="mkt-card-title" style="margin:0">✅ GBP Post Ready</div>
        <div style="display:flex;gap:6px">
          <span class="badge badge-green">GBP Post</span>
          <span class="badge badge-gold">${lang}</span>
          <span class="badge badge-gray">${(p.char_count||p.post_text?.length||0)} chars</span>
        </div>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:14px;font-size:13px;line-height:1.8;margin-bottom:12px;white-space:pre-wrap">${p.post_text}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div style="font-size:11px"><span style="color:var(--text3)">📸 Photo:</span> ${p.photo_suggestion}</div>
        <div style="font-size:11px"><span style="color:var(--text3)">⏰ Best time:</span> ${p.best_time_to_post}</div>
      </div>
      ${p.notes ? `<div style="font-size:11px;color:var(--text3);font-style:italic;margin-bottom:12px">${p.notes}</div>` : ''}
      <div style="display:flex;gap:8px">
        <button class="mkt-btn mkt-btn-primary" onclick="copyContent('${p.post_text?.replace(/'/g,"\'").replace(/\n/g,'\\n')}')">📋 Copy Post</button>
        <a href="https://business.google.com" target="_blank" class="mkt-btn mkt-btn-ghost">Open GBP to Post ↗</a>
        <button class="mkt-btn mkt-btn-ghost" onclick="generateGBPPost()">🔄 Regenerate</button>
      </div>
    </div>`;
  } catch(e) {
    outputEl.innerHTML = `<div class="mkt-card" style="border-color:var(--red)"><div style="color:var(--red);font-size:12px">Error: ${e.message}</div></div>`;
  }
}

let currentPosterCanvas = null;
let currentPosterCaption = '';

async function generateFullPoster() {
  const topic = document.getElementById('ps-topic')?.value?.trim();
  const lang = document.getElementById('ps-lang')?.value;
  const template = document.getElementById('ps-template')?.value;
  const imgSource = document.getElementById('ps-image-source')?.value;
  if (!topic) { showMktToast('Enter a topic first'); return; }

  const preview = document.getElementById('ps-preview');
  preview.innerHTML = `<div style="text-align:center;padding:40px">
    <div class="ai-thinking" style="justify-content:center"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>
    <div style="font-size:12px;color:var(--text3);margin-top:12px" id="ps-status">Writing content…</div>
  </div>`;

  // Load brand profile
  const {data:bpArr} = await sb.from('brand_profile').select('*').limit(1).then(r=>r,()=>({data:[]}));
  const bp = (bpArr||[])[0]||{business_name:'V Wholesale',tagline:'Build Better. Pay Less.',phone:'8712697930',website:'https://vwholesale.in',address:'NH65, Bhavanipuram, Vijayawada',primary_color:'#1a2744',secondary_color:'#c9a84c'};

  const langMap={te:'Telugu',en:'English','te+en':'bilingual Telugu+English',hi:'Hindi'};

  try {
    // STEP 1: Generate text content
    const textRes = await fetch(MKT_SB_URL+'/functions/v1/marketing-ai',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':MKT_SB_KEY},
      body:JSON.stringify({
        action:'poster_text',agent:'Content Agent',model:'gpt-4o-mini',
        prompt:`You are creating premium marketing content for V Wholesale — Vijayawada's #1 home building superstore.

BUSINESS: V Wholesale | ${bp.address} | ${bp.phone} | ${bp.website}
TEMPLATE: ${template} | LANGUAGE: ${langMap[lang]} | TOPIC: ${topic}

CRITICAL RULES:
- Write in ${langMap[lang]} — natural, conversational, local Vijayawada tone
- Headlines must be punchy and emotionally compelling
- Features must be specific benefits, not generic claims
- Never invent prices, discounts or unavailable products
- Telugu must sound like a local person wrote it, not translated

Respond ONLY in this exact JSON (no markdown):
{
  "headline": "powerful 6-8 word headline in ${langMap[lang]}",
  "sub_headline": "compelling 10-14 word sub in ${langMap[lang]}",
  "features": ["specific benefit 1 (max 5 words)", "specific benefit 2 (max 5 words)", "specific benefit 3 (max 5 words)", "specific benefit 4 (max 5 words)"],
  "cta": "action-oriented CTA (max 4 words)",
  "caption": "engaging 4-5 line social caption with emojis in ${langMap[lang]}",
  "hashtags": ["vijayawada", "vwholesale", "topic-specific-1", "topic-specific-2", "homeimprovement"],
  "dalle_prompt": "photorealistic ${template === 'contractor' ? 'professional contractor working on luxury home construction site, Andhra Pradesh' : template === 'offer' ? 'elegant showroom display of premium home materials, warm spotlights, luxury retail atmosphere' : 'stunning luxury Indian home interior, premium finishes, aspirational lifestyle'}, ultra-detailed, no text"
}`,
        context:{topic,template,lang,business:'V Wholesale'}
      })
    });
    const textData = await textRes.json();
    if (!textData.ok) throw new Error(textData.error);
    const content = textData.output;
    currentPosterCaption = content.caption + '\n\n' + (content.hashtags||[]).map(h=>'#'+h).join(' ');

    // Show caption
    const capEl = document.getElementById('ps-caption-preview');
    if(capEl){capEl.style.display='block';capEl.textContent=currentPosterCaption;}

    // STEP 2: Get hero image
    let heroImageUrl = null;
    if (imgSource === 'dalle') {
      document.getElementById('ps-status').textContent = 'Generating hero image with DALL-E…';
      const dalleRes = await fetch(MKT_SB_URL+'/functions/v1/marketing-ai',{
        method:'POST',headers:{'Content-Type':'application/json','apikey':MKT_SB_KEY},
        body:JSON.stringify({action:'generate_image',agent:'Poster Agent',
          dalle_prompt: `Ultra-realistic interior design photograph. ${content.dalle_prompt || `Luxury Indian home interior featuring ${topic}`}. Warm ambient lighting, high-end finishes, aspirational lifestyle, professional architectural photography, shot with wide-angle lens, depth of field, no text or watermarks, hyper-detailed, 4K quality. Style: Architectural Digest India editorial shoot.`,
          size:'1024x1024',quality:'standard'})
      });
      const dalleData = await dalleRes.json();
      if (dalleData.ok) heroImageUrl = dalleData.image_url;
    } else if (imgSource === 'upload') {
      const file = document.getElementById('ps-upload')?.files?.[0];
      if (file) heroImageUrl = URL.createObjectURL(file);
    }

    // STEP 3: Build poster on canvas
    document.getElementById('ps-status').textContent = 'Building poster…';
    const canvas = await buildPosterCanvas(bp, content, heroImageUrl, template);
    currentPosterCanvas = canvas;

    // Show in preview
    preview.innerHTML = '';
    canvas.style.width = '100%';
    canvas.style.borderRadius = '10px';
    preview.appendChild(canvas);

    // Show publish card
    document.getElementById('ps-publish-card').style.display = 'block';

    // Save to history
    await sb.from('poster_history').insert({
      topic, template, language:lang,
      headline:content.headline, caption:currentPosterCaption,
      created_by:mktProfile?.name, status:'draft'
    });
    loadPosterHistory();

    showMktToast('✅ Poster ready — download or publish!');

  } catch(e) {
    preview.innerHTML = `<div style="text-align:center;padding:40px;color:var(--red)"><div style="font-size:32px;margin-bottom:8px">⚠️</div><div>${e.message}</div></div>`;
  }
}

async function buildPosterCanvas(bp, content, heroUrl, template) {
  const W=1080, H=1080;
  const canvas = document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx = canvas.getContext('2d');
  const navy = bp.primary_color||'#1a2744';
  const gold  = bp.secondary_color||'#c9a84c';
  const white = '#FFFFFF';

  // ── FULL BACKGROUND: navy ───────────────────────────────────
  ctx.fillStyle = navy;
  ctx.fillRect(0,0,W,H);

  // ── HERO IMAGE (right 55%, rows 0–720) ─────────────────────
  const heroX=460, heroY=0, heroW=620, heroH=720;
  if (heroUrl) {
    try {
      const img = await loadImage(heroUrl);
      ctx.save();
      // rounded clip for hero
      ctx.beginPath();
      ctx.rect(heroX, heroY, heroW, heroH);
      ctx.clip();
      // cover-fit
      const ir = img.width/img.height, cr = heroW/heroH;
      let sw,sh,sx,sy;
      if(ir>cr){sh=img.height;sw=sh*cr;sx=(img.width-sw)/2;sy=0;}
      else{sw=img.width;sh=sw/cr;sy=(img.height-sh)/2;sx=0;}
      ctx.drawImage(img,sx,sy,sw,sh,heroX,heroY,heroW,heroH);
      ctx.restore();
      // dark overlay for readability
      const ov=ctx.createLinearGradient(heroX,0,heroX+heroW,0);
      ov.addColorStop(0,'rgba(10,23,58,0.55)');
      ov.addColorStop(1,'rgba(10,23,58,0.08)');
      ctx.fillStyle=ov; ctx.fillRect(heroX,heroY,heroW,heroH);
    } catch(e) { _heroGrad(ctx,heroX,heroY,heroW,heroH,navy,gold); }
  } else { _heroGrad(ctx,heroX,heroY,heroW,heroH,navy,gold); }

  // Left-fade over hero so content reads cleanly
  const lf=ctx.createLinearGradient(heroX,0,heroX+180,0);
  lf.addColorStop(0,'rgba(10,23,58,1)'); lf.addColorStop(1,'rgba(10,23,58,0)');
  ctx.fillStyle=lf; ctx.fillRect(heroX,0,180,heroH);

  // ── LEFT CONTENT PANEL (0–500) ─────────────────────────────
  // Subtle left panel shade
  const lp=ctx.createLinearGradient(0,0,500,0);
  lp.addColorStop(0,navy); lp.addColorStop(1,'rgba(10,23,58,0.92)');
  ctx.fillStyle=lp; ctx.fillRect(0,0,500,720);

  // ── TOP BAR ────────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(0,0,W,72);
  // Logo pill
  ctx.fillStyle=gold; _pill(ctx,24,14,44,44,8);
  ctx.fillStyle=navy; ctx.font='bold 22px "DM Sans",Arial,sans-serif';
  ctx.textAlign='center'; ctx.fillText('VW',46,42);
  // Brand name
  ctx.fillStyle=white; ctx.font='bold 24px "DM Sans",Arial,sans-serif';
  ctx.textAlign='left'; ctx.fillText(bp.business_name||'V Wholesale',80,46);
  // Right badge
  ctx.fillStyle=gold; _pill(ctx,W-190,14,166,44,22);
  ctx.fillStyle=navy; ctx.font='bold 16px "DM Sans",Arial,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('★ PREMIUM QUALITY',W-107,42);

  // ── HEADLINE ───────────────────────────────────────────────
  // Gold accent bar
  ctx.fillStyle=gold; ctx.fillRect(28,108,5,90);
  // Main headline — large, bold, white
  ctx.fillStyle=white;
  const hLines = _splitLines(ctx,content.headline||'',28+20,440,56,'900');
  hLines.forEach((l,i)=>{ ctx.font=`900 ${i===0?56:48}px "DM Sans",Arial,sans-serif`; ctx.textAlign='left'; ctx.fillStyle=i===0?white:gold; ctx.fillText(l,52,130+i*62); });

  // Sub headline
  ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.font='400 24px "DM Sans",Arial,sans-serif';
  _wrapDraw(ctx, content.sub_headline||'', 52, 230, 400, 32);

  // Gold divider
  ctx.fillStyle=gold; ctx.fillRect(52,270,60,3);

  // ── FEATURE CARDS ──────────────────────────────────────────
  const features = (content.features||[]).slice(0,4);
  features.forEach((f,i)=>{
    const fy=298+i*92;
    // Card background
    ctx.fillStyle='rgba(255,255,255,0.07)';
    _pill(ctx,28,fy,420,76,12);
    // Gold left accent
    ctx.fillStyle=gold; ctx.fillRect(28,fy,4,76);
    // Green check circle
    ctx.fillStyle='#22C55E';
    ctx.beginPath(); ctx.arc(70,fy+38,22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=white; ctx.font='bold 20px sans-serif'; ctx.textAlign='center';
    ctx.fillText('✓',70,fy+46);
    // Feature text — handle long text
    ctx.fillStyle=white; ctx.font=`600 ${f.length>30?20:23}px "DM Sans",Arial,sans-serif`;
    ctx.textAlign='left';
    _wrapDraw(ctx, f, 102, fy+30, 330, 26);
  });

  // ── CATEGORY STRIP (full width, 720–880) ──────────────────
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,720,W,160);
  // Gold top line
  ctx.fillStyle=gold; ctx.fillRect(0,720,W,3);
  const cats = (bp.categories||['Tiles','Granite','Sanitaryware','Paints','Electricals']);
  const cIcons=['🏠','🪨','🚿','🎨','⚡'];
  const cW=W/cats.length;
  cats.forEach((cat,i)=>{
    const cx2=i*cW+cW/2;
    if(i>0){ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(i*cW,724,1,152);}
    // Hover box on active (first by default)
    if(i===0){ctx.fillStyle='rgba(201,168,76,0.12)'; ctx.fillRect(i*cW,720,cW,160);}
    ctx.font='34px sans-serif'; ctx.textAlign='center';
    ctx.fillText(cIcons[i]||'🏠',cx2,790);
    ctx.fillStyle=i===0?gold:white;
    ctx.font=`bold ${cat.length>10?15:18}px "DM Sans",Arial,sans-serif`;
    ctx.fillText(cat.toUpperCase(),cx2,830);
    if(i===0){ctx.fillStyle=gold; ctx.fillRect(i*cW+cW*0.25,856,cW*0.5,2);}
  });

  // ── FOOTER (880–1080) ─────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(0,880,W,200);
  ctx.fillStyle=gold; ctx.fillRect(0,880,W,2);

  // Address + contact
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.font='20px "DM Sans",Arial,sans-serif'; ctx.textAlign='left';
  ctx.fillText('📍 '+(bp.address||'NH65, Bhavanipuram, Vijayawada'),32,930);
  ctx.fillText('📞 '+(bp.phone||'8712697930'),32,962);
  ctx.fillStyle=gold;
  ctx.fillText('🌐 '+(bp.website||'vwholesale.in'),32+300,962);

  // CTA button
  ctx.fillStyle=gold; _pill(ctx,W-260,895,228,66,33);
  ctx.fillStyle=navy; ctx.font='bold 22px "DM Sans",Arial,sans-serif'; ctx.textAlign='center';
  ctx.fillText(content.cta||'Visit Us Today',W-146,934);

  // Tagline
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.font='italic 18px "DM Sans",Arial,sans-serif'; ctx.textAlign='right';
  ctx.fillText(bp.tagline||'Build Better. Pay Less.',W-32,1000);

  // Divider line
  ctx.fillStyle='rgba(201,168,76,0.3)'; ctx.fillRect(32,1010,W-64,1);

  // Bottom row: social handles placeholder
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.font='16px "DM Sans",Arial,sans-serif'; ctx.textAlign='left';
  ctx.fillText('@vwholesale.in',32,1050);
  ctx.textAlign='right';
  ctx.fillText('Vijayawada's Home Building Store',W-32,1050);

  return canvas;
}

function _heroGrad(ctx,x,y,w,h,c1,c2){
  const g=ctx.createLinearGradient(x,y,x+w,y+h);
  g.addColorStop(0,c2+'88'); g.addColorStop(0.5,c1); g.addColorStop(1,c2+'44');
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
  // subtle pattern
  ctx.fillStyle='rgba(255,255,255,0.03)';
  for(let i=0;i<8;i++) for(let j=0;j<8;j++){
    if((i+j)%2===0) ctx.fillRect(x+i*(w/8),y+j*(h/8),w/8,h/8);
  }
}

function _pill(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill();
}

function _splitLines(ctx,text,x,maxW,size,weight){
  ctx.font=`${weight} ${size}px "DM Sans",Arial,sans-serif`;
  const words=text.split(' '); let line=''; const lines=[];
  for(const w of words){
    const t=line+(line?' ':'')+w;
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}
    else line=t;
  }
  if(line) lines.push(line);
  return lines;
}

function _wrapDraw(ctx,text,x,y,maxW,lineH){
  const fsize=parseInt(ctx.font)||24;
  const words=text.split(' '); let line=''; let ly=y;
  for(const w of words){
    const t=line+(line?' ':'')+w;
    if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,ly);line=w;ly+=lineH;}
    else line=t;
  }
  if(line) ctx.fillText(line,x,ly);
}

function loadImage(src){
  return new Promise((res,rej)=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>res(img); img.onerror=rej; img.src=src;
  });
}

function roundRect2(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill();
}

function drawGradientPanel(ctx,x,y,w,h,c1,c2){
  const g=ctx.createLinearGradient(x,y,x+w,y+h);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
}

function drawWrappedText(ctx,text,x,y,maxW,size,weight){
  if(!text) return;
  ctx.font=`${weight} ${size}px "Noto Sans Telugu","DM Sans",sans-serif`;
  const words=text.split(' '); let line=''; let ly=y;
  for(const w of words){
    const test=line+(line?' ':'')+w;
    if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,x,ly);line=w;ly+=size*1.2;}
    else line=test;
  }
  if(line) ctx.fillText(line,x,ly);
}

function drawStarburst(ctx,cx,cy,r,fill,text){
  const spikes=12;
  ctx.save(); ctx.fillStyle=fill; ctx.beginPath();
  for(let i=0;i<spikes*2;i++){
    const angle=(i*Math.PI)/spikes-Math.PI/2;
    const rad=i%2===0?r:r*0.72;
    i===0?ctx.moveTo(cx+Math.cos(angle)*rad,cy+Math.sin(angle)*rad):ctx.lineTo(cx+Math.cos(angle)*rad,cy+Math.sin(angle)*rad);
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
}

function downloadCurrentPoster(){
  if(!currentPosterCanvas){showMktToast('Generate a poster first');return;}
  const a=document.createElement('a');
  a.download='vwholesale-poster-'+Date.now()+'.png';
  a.href=currentPosterCanvas.toDataURL('image/png'); a.click();
  showMktToast('✅ Downloaded!');
}

async function publishPoster(){
  if(!currentPosterCanvas){showMktToast('Generate a poster first');return;}
  const platforms=['instagram','facebook','gbp'].filter(p=>{
    const el=document.getElementById('pub-'+p);
    return el&&!el.disabled&&el.checked;
  });
  if(!platforms.length){showMktToast('Select at least one platform');return;}
  const scheduledAt=document.getElementById('ps-schedule')?.value;
  if(scheduledAt){
    await sb.from('poster_history').insert({
      topic:document.getElementById('ps-topic')?.value,
      platforms, caption:currentPosterCaption,
      scheduled_at:new Date(scheduledAt).toISOString(),
      status:'scheduled', created_by:mktProfile?.name
    });
    showMktToast('✅ Scheduled for '+new Date(scheduledAt).toLocaleDateString('en-IN'));
  } else {
    showMktToast('⚠️ Direct publishing coming soon — downloading instead');
    downloadCurrentPoster();
  }
  loadPosterHistory();
}

async function loadPosterHistory(){
  const {data:history} = await sb.from('poster_history').select('*').order('created_at',{ascending:false}).limit(5).then(r=>r,()=>({data:[]}));
  const card = document.getElementById('ps-history-card');
  const el = document.getElementById('ps-history');
  if(!card||!el) return;
  if(!(history||[]).length) return;
  card.style.display='block';
  el.innerHTML = (history||[]).map(h=>`
  <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">
    <div style="flex:1"><div style="font-weight:700">${h.topic}</div><div style="font-size:11px;color:var(--text3)">${h.template} · ${h.language} · ${new Date(h.created_at).toLocaleDateString('en-IN')}</div></div>
    <span class="badge ${h.status==='published'?'badge-green':h.status==='scheduled'?'badge-blue':'badge-gray'}">${h.status}</span>
  </div>`).join('');
}
