<meta charset="UTF-8">
  <script>
  // NUCLEAR CACHE CLEAR — runs before anything else
  (async function() {
    try {
      // Kill all service workers
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      // Clear ALL caches
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch(e) {}
  })();
</script>

/* LAYOUT */
.layout{display:flex;min-height:100vh}

/* SIDEBAR */

.sb-logo{padding:16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.sb-logo-box{width:36px;height:36px;background:var(--bdk);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.sb-logo-text{font-size:14px;font-weight:900;color:var(--t1)}

.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;margin-bottom:1px}

.sb-footer{padding:12px;border-top:1px solid var(--bdr)}

/* MAIN */

.topbar{background:#0A1628;border-bottom:1px solid var(--bdr);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:40}

.topbar-acts{display:flex;gap:8px;align-items:center}

.stat-card{background:var(--card);border-radius:12px;border:1px solid var(--bdr);padding:14px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:none;display:inline-flex;align-items:center;gap:6px}

.btn-ghost{background:none;border:1px solid var(--bdr);color:var(--t2)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}

/* TOAST */

<script>
const SB_URL = 'https://ndamdnlsuktucqtcbhgp.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kYW1kbmxzdWt0dWNxdGNiaGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTg1MzgsImV4cCI6MjA5Njk5NDUzOH0.7pGJu4bbNhl4E-4Do24jS9_p6nLUa1eN4JXQSqEF9VU';

let _adminSession = null;
let _adminProfile = null;
let _currentPage = 'dashboard';

// ── HELPERS ──
async function sbFetch(path, opts={}) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers:{'Content-Type':'application/json','apikey':ANON,'Authorization':`Bearer ${_adminSession?.access_token||ANON}`,...(opts.headers||{})},
    ...opts
  });
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  return r.json().catch(()=>null);
}

async function proFn(body) {
  const r = await fetch(`${SB_URL}/functions/v1/professional-api`, {
    method:'POST', headers:{'Content-Type':'application/json','apikey':ANON,'x-admin-token':_adminSession?.access_token||''},
    body:JSON.stringify(body)
  });
  return r.json();
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.style.borderLeft = `3px solid ${type==='ok'?'#22C55E':type==='err'?'#EF4444':'#3B82F6'}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},3000);
}

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });

function setPageTitle(t) { document.getElementById('page-title').textContent = t; document.getElementById('topbar-time').textContent = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }

function setNav(page) {
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  document.getElementById(`nav-${page}`)?.classList.add('active');
}

// ── AUTH ──
async function adminLogin() {
  const phone = document.getElementById('admin-phone').value.trim();
  const pin = document.getElementById('admin-pin').value.trim();
  if (!phone||phone.length<10) { showLoginErr('Enter valid mobile'); return; }
  if (!pin||pin.length<6) { showLoginErr('Enter 6-digit PIN'); return; }
  const btn = document.getElementById('admin-login-btn');
  btn.disabled = true; btn.textContent = 'Logging in…';
  try {
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method:'POST', headers:{'Content-Type':'application/json','apikey':ANON},
      body:JSON.stringify({email:phone+'@vwholesale.app', password:pin})
    });
    const data = await res.json();
    if (data.error||!data.access_token) throw new Error(data.error_description||data.error||'Wrong PIN or not registered');

    // Store session immediately so sbFetch uses authenticated token
    _adminSession = data;
    const uid = data.user?.id;

    // Try lookup by user ID first (most reliable, uses JWT auth)
    let profile = uid ? await sbFetch(`profiles?id=eq.${uid}&select=id,name,role,status`).then(d=>d?.[0]).catch(()=>null) : null;

    // Fallback: lookup by phone
    if (!profile) {
      profile = await sbFetch(`profiles?phone=eq.${phone}&select=id,name,role,status`).then(d=>d?.[0]).catch(()=>null);
    }

    // Fallback: use data from JWT user metadata
    if (!profile && data.user) {
      profile = {
        id: uid,
        name: data.user.user_metadata?.name || 'Admin',
        phone: phone,
        role: data.user.user_metadata?.role || 'admin',
        status: 'approved'
      };
    }

    if (!profile) throw new Error('Profile not found. Contact store admin.');
    if (!['admin','manager','owner','staff','executive'].includes(profile.role)) {
      throw new Error(`Access denied. Your role is "${profile.role}". Admin access required.`);
    }

    _adminProfile = profile;
    localStorage.setItem('vw_admin_session', JSON.stringify(data));
    localStorage.setItem('vw_admin_profile', JSON.stringify(profile));
    startAdminApp();
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Login to Admin';
    showLoginErr(e.message);
  }
}

function showLoginErr(msg) { const el = document.getElementById('admin-login-err'); el.textContent = msg; el.style.display = 'block'; }

function adminLogout() {
  if (!confirm('Log out of Admin?')) return;
  localStorage.removeItem('vw_admin_session');
  localStorage.removeItem('vw_admin_profile');
  location.reload();
}

function startAdminApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('admin-app').style.display = 'flex';
  document.getElementById('admin-name').textContent = _adminProfile.name||'Admin';
  document.getElementById('admin-role').textContent = _adminProfile.role;
  loadPage('dashboard');
}

// ── PAGES ──
async function loadPage(page) {
  _currentPage = page;
  setNav(page);
  const content = document.getElementById('page-content');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--t3)">Loading…</div>';
  document.getElementById('sidebar').classList.remove('open');
  const pages = {dashboard:loadDashboard, orders:loadOrders, customers:loadCustomers, professionals:loadProfessionals, briefs:loadBriefs, products:loadProducts, categories:loadCategories, catalog:loadCatalog, promos:loadPromos, staff:loadStaff, settings:loadSettings, analytics:loadAnalytics, accounts:loadAccounts, gst:loadGST, eod:loadEOD, hr:loadHR, vendors:loadVendors, commissions:loadCommissions, referrals:loadReferrals, marketing:loadMarketing};
  if (pages[page]) await pages[page]();
}

// ── DASHBOARD ──
async function loadDashboard() {
  setPageTitle('Dashboard');
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString();
  const [orders, customers, professionals, briefs, products] = await Promise.all([
    sbFetch(`orders?select=id,grand_total,order_status,created_at&created_at=gte.${todayStr}&order=created_at.desc`).catch(()=>[]),
    sbFetch(`profiles?select=id,created_at&role=eq.customer&created_at=gte.${todayStr}`).catch(()=>[]),
    sbFetch(`contractors?select=id,status&approval_status=eq.approved`).catch(()=>[]),
    sbFetch(`project_briefs?select=id,status&status=eq.pending`).catch(()=>[]),
    sbFetch(`products?select=id,stock,name&is_active=eq.true&stock=lte.5&stock=gte.0`).catch(()=>[]),
  ]);
  const todayRevenue = (orders||[]).filter(o=>o.order_status!=='cancelled').reduce((s,o)=>s+parseFloat(o.grand_total||0),0);
  const recentOrders = await sbFetch(`orders?select=id,order_no,customer_name,grand_total,order_status,created_at&order=created_at.desc&limit=10`).catch(()=>[]);

  document.getElementById('page-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">₹${todayRevenue.toLocaleString('en-IN')}</div><div class="stat-lbl">Today's Revenue</div><div class="stat-change stat-up">${(orders||[]).length} orders today</div></div>
      <div class="stat-card"><div class="stat-val">${(customers||[]).length}</div><div class="stat-lbl">New Customers Today</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--gold)">${(briefs||[]).length}</div><div class="stat-lbl">Pending Project Briefs</div><div class="stat-change"><button class="btn btn-primary" onclick="loadPage('briefs')" style="padding:4px 10px;font-size:10px;margin-top:4px">Review →</button></div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${(products||[]).length}</div><div class="stat-lbl">Low Stock Items</div></div>
    </div>
    <div class="card">
      <div class="card-title">Recent Orders <span style="font-size:11px;color:var(--t3);font-weight:600">${(recentOrders||[]).length} latest</span></div>
      <div style="overflow-x:auto"><table class="tbl">
        <tr><th>Order No</th><th>Customer</th><th>Amount</th><th>Status</th><th>Time</th><th>Action</th></tr>

async function verifyBrief(briefId, contractorId, contractorName) {
  if (!confirm(`Verify brief for ${contractorName}?\n\nThis will award 500 Club points to the contractor.`)) return;
  try {
    await sbFetch(`project_briefs?id=eq.${briefId}`, {method:'PATCH', headers:{'Prefer':'return=minimal'}, body:JSON.stringify({status:'verified', verified_by:_adminProfile.name, verified_at:new Date().toISOString()})});
    if (contractorId) {
      // Award 500 points
      await sbFetch(`contractor_loyalty`, {method:'POST', headers:{'Prefer':'return=minimal'}, body:JSON.stringify({contractor_id:contractorId, transaction_type:'bonus', points:500, reference_type:'project_brief', reference_id:briefId, description:'Project brief verified — 500 pts bonus'})});
      await sbFetch(`project_briefs?id=eq.${briefId}`, {method:'PATCH', headers:{'Prefer':'return=minimal'}, body:JSON.stringify({points_awarded:true})});
    }
    toast(`✅ Brief verified — 500 pts awarded to ${contractorName}`, 'ok');
    loadBriefs();
  } catch(e) { toast('Failed: '+e.message, 'err'); }
}

async function rejectBrief(briefId) {
  const reason = prompt('Rejection reason (optional):');
  try {
    await sbFetch(`project_briefs?id=eq.${briefId}`, {method:'PATCH', headers:{'Prefer':'return=minimal'}, body:JSON.stringify({status:'rejected', rejection_reason:reason||null, verified_by:_adminProfile.name, verified_at:new Date().toISOString()})});
    toast('Brief rejected', 'ok');
    loadBriefs();
  } catch(e) { toast('Failed: '+e.message, 'err'); }
}

async function savePromo() {
  const code = document.getElementById('promo-code')?.value?.trim()?.toUpperCase();
  const val = parseFloat(document.getElementById('promo-val')?.value||0);
  if (!code||!val) { toast('Code and value required','err'); return; }
  try {
    await sbFetch(`promo_codes`, {method:'POST', headers:{'Prefer':'return=minimal'}, body:JSON.stringify({
      code, discount_type:document.getElementById('promo-type').value,
      discount_value:val, min_order_amount:parseFloat(document.getElementById('promo-min')?.value||0)||null,
      max_discount_amount:parseFloat(document.getElementById('promo-max')?.value||0)||null,
      description:document.getElementById('promo-desc')?.value?.trim()||null, is_active:true
    })});
    toast('Promo code created','ok'); closeModal(); loadPromos();
  } catch(e) { toast('Failed: '+e.message,'err'); }
}

async function togglePromo(id, isActive) {
  try {
    await sbFetch(`promo_codes?id=eq.${id}`, {method:'PATCH', headers:{'Prefer':'return=minimal'}, body:JSON.stringify({is_active:!isActive})});
    toast(`Promo ${isActive?'disabled':'enabled'}`,'ok'); loadPromos();
  } catch(e) { toast('Failed','err'); }
}

    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bdr)">${section}</div>

          <label style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card2);border-radius:8px;cursor:pointer;border:1px solid ${perms.includes(key)?'var(--b)':'var(--bdr)'}">

    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">

async function savePermissions(uid, name) {
  const checked = [...document.querySelectorAll('#perm-modal input[type=checkbox]:checked')].map(c=>c.value);
  try {
    await sbFetch(`profiles?id=eq.${uid}`, {
      method:'PATCH', 
      headers:{'Prefer':'return=minimal'},
      body:JSON.stringify({permissions: checked})
    });
    toast(`✅ Access updated for ${name} — ${checked.length} modules assigned`, 'ok');
    closeModal();
    loadStaff();
  } catch(e) { toast('Failed to save: '+e.message, 'err'); }
}

async function createStaffOffer() {
  const name = document.getElementById('new-name')?.value?.trim();
  const phone = document.getElementById('new-phone')?.value?.trim();
  const role = document.getElementById('new-role')?.value?.trim();
  const salary = parseFloat(document.getElementById('new-salary')?.value||0);
  const startDate = document.getElementById('new-startdate')?.value;
  if (!name) { toast('Enter candidate name','err'); return; }
  if (!phone||phone.length<10) { toast('Enter valid 10-digit phone','err'); return; }
  if (!role) { toast('Enter role/designation','err'); return; }
  if (!salary) { toast('Enter monthly salary','err'); return; }
  if (!startDate) { toast('Select start date','err'); return; }

  const pin = Math.floor(1000+Math.random()*9000).toString();
  const offer = {
    candidate_name: name, candidate_phone: phone, role,
    department: document.getElementById('new-dept')?.value||'',
    salary, start_date: startDate,
    probation_months: parseInt(document.getElementById('new-probation')?.value||6),
    reporting_manager: document.getElementById('new-manager')?.value?.trim()||'',
    custom_clauses: document.getElementById('new-clauses')?.value?.trim()||'',
    pin, status: 'sent',
    created_by_name: _currentProfile?.name||'HR',
    created_at: new Date().toISOString(),
    auth_account_created: false
  };

  try {
    const res = await sbFetch('staff_offers', {method:'POST', headers:{'Prefer':'return=representation'}, body:JSON.stringify(offer)});
    const saved = Array.isArray(res) ? res[0] : res;
    if (!saved?.id) throw new Error('Failed to save offer');
    closeModal();
    showOfferWhatsApp(saved);
    if (typeof loadHR === 'function') setTimeout(loadHR, 500);
  } catch(e) { toast('Error: '+e.message,'err'); }
}
window.createStaffOffer = createStaffOffer;

async function activateStaffFromOffer(offerId) {
  const res = await sbFetch('staff_offers?id=eq.'+offerId+'&select=*').catch(()=>[]);
  const offer = Array.isArray(res) ? res[0] : res;
  if (!offer) { toast('Offer not found','err'); return; }
  const data = offer.submitted_data || {};

  const pin = offer.pin || '123456';
  const name = offer.candidate_name;
  const phone = offer.candidate_phone;
  const role = data.role || offer.role || 'staff';

  if (!confirm(`Activate account for ${name} (${phone})? This will create their login with PIN ${pin}.`)) return;

  try {
    // Create Supabase auth user via edge function
    const fnUrl = `${SB_URL}/functions/v1/create-staff-user`;
    const fnRes = await fetch(fnUrl, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+ANON, 'apikey':ANON },
      body: JSON.stringify({ phone, pin, name, role })
    });
    const fnData = await fnRes.json().catch(()=>({}));

    if (!fnData.ok) {
      // Fallback — create profile directly (requires service role, won't work here)
      // Show manual instruction instead
      toast('⚠️ Auto-create not available. Create account manually in Supabase Auth.','warn');
      openModal(`<div class="modal-title">Manual Account Creation</div>
        <div style="font-size:13px;color:var(--t2);line-height:1.8">
          <div><strong>Name:</strong> ${name}</div>
          <div><strong>Email:</strong> ${phone}@vwholesale.app</div>
          <div><strong>PIN (password):</strong> ${pin}</div>
          <div><strong>Role:</strong> ${role}</div>
        </div>
        <p style="font-size:12px;color:var(--t3);margin-top:10px">Go to Supabase → Authentication → Users → Add User with above credentials. Then update profiles table to set status=approved.</p>
        <button onclick="closeModal()" class="btn btn-primary" style="width:100%;margin-top:12px">Got it</button>`);
      return;
    }

    // Mark offer as approved
    await sbFetch('staff_offers?id=eq.'+offerId, {method:'PATCH', headers:{'Prefer':'return=minimal'}, body:JSON.stringify({status:'approved',auth_account_created:true,reviewed_by_name:_currentProfile?.name,reviewed_at:new Date().toISOString()})});

    toast(`✅ Account created for ${name}. PIN: ${pin}`,'ok');
    loadHR();
  } catch(e) {
    toast('Error: '+e.message,'err');
  }
}
window.activateStaffFromOffer = activateStaffFromOffer;

async function loadGST() {

  document.getElementById('page-content').innerHTML = `
    <div class="card">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">

      </div>
      <button class="btn btn-primary" onclick="generateGSTReport()">Generate Report</button>
    </div>
    <div id="gst-report"></div>`;

async function generateGSTReport() {
  const from = document.getElementById('gst-from')?.value;
  const to = document.getElementById('gst-to')?.value;
  if (!from||!to) { toast('Select date range','err'); return; }
  let q = `orders?select=order_no,grand_total,items,created_at&order_status=neq.cancelled`;
  if (from) q += `&created_at=gte.${from}`;
  if (to) q += `&created_at=lte.${to}T23:59:59`;
  const orders = await sbFetch(q).catch(()=>[]);
  const total = (orders||[]).reduce((s,o)=>s+parseFloat(o.grand_total||0),0);
  const gst18 = total * 0.18 / 1.18;
  document.getElementById('gst-report').innerHTML = `
    <div class="card">
      <div class="card-title">GST Report: ${from} to ${to}</div>
      <div style="display:grid;gap:8px">
        <div style="display:flex;justify-content:space-between;padding:10px;background:var(--card2);border-radius:8px">
          <span>Total Sales (incl. GST)</span><strong>₹${total.toLocaleString('en-IN')}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px;background:var(--card2);border-radius:8px">
          <span>Taxable Value</span><strong>₹${(total-gst18).toLocaleString('en-IN')}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px;background:var(--blt);border-radius:8px;border:1px solid var(--b)">
          <span>GST Collected (approx 18%)</span><strong style="color:var(--b)">₹${gst18.toLocaleString('en-IN')}</strong>
        </div>
        <div style="font-size:11px;color:var(--t3);padding:8px">Note: For exact GSTR-1/GSTR-3B, export from AlignBooks ERP</div>
      </div>
    </div>`;
}
window.generateGSTReport = generateGSTReport;

function hrTab(tab) {
  ['team','payroll','advances','docs','onboard','slabs'].forEach(t => {
    document.getElementById('hr-panel-'+t).style.display = t===tab ? 'block' : 'none';
    const btn = document.getElementById('hr-tab-'+t);
    if (btn) { btn.className = t===tab ? 'btn btn-primary' : 'btn btn-ghost'; btn.style.fontSize='12px'; }
  });
  if (tab==='slabs') loadIncentiveSlabs();

async function saveStaffHR(profileId) {
  const basic = parseFloat(document.getElementById('hrp-basic')?.value||0);
  const hra = parseFloat(document.getElementById('hrp-hra')?.value||0);
  const allow = parseFloat(document.getElementById('hrp-allow')?.value||0);
  const gross = parseFloat(document.getElementById('hrp-gross')?.value||0) || (basic+hra+allow);
  const join = document.getElementById('hrp-join')?.value;
  const probEnd = join ? new Date(new Date(join).setMonth(new Date(join).getMonth()+6)).toISOString().split('T')[0] : null;

  const payload = {
    profile_id: profileId,
    employee_code: document.getElementById('hrp-code')?.value?.trim()||null,
    designation: document.getElementById('hrp-desig')?.value?.trim()||null,
    department: document.getElementById('hrp-dept')?.value?.trim()||null,
    joining_date: join||null,
    probation_end: probEnd,
    basic, hra, allowance: allow, gross_salary: gross,
    bank_account: document.getElementById('hrp-bank')?.value?.trim()||null,
    updated_at: new Date().toISOString()
  };

  // Upsert staff_hr
  const res = await fetch(supabaseUrl+'/rest/v1/staff_hr?profile_id=eq.'+profileId, {
    method: 'PATCH',
    headers: {'apikey':supabaseKey,'Authorization':'Bearer '+supabaseKey,'Content-Type':'application/json','Prefer':'return=minimal'},
    body: JSON.stringify(payload)
  });
  if (res.status === 404 || res.status === 0) {
    // Row doesn't exist — insert
    await fetch(supabaseUrl+'/rest/v1/staff_hr', {
      method: 'POST',
      headers: {'apikey':supabaseKey,'Authorization':'Bearer '+supabaseKey,'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify(payload)
    });
  }
  showToast('✅ HR profile saved');
  document.getElementById('hr-modal')?.remove();
  loadHR();
}

async function rejectAdvance(advId, staffName) {

  await fetch(supabaseUrl+'/rest/v1/staff_advances?id=eq.'+advId, {

    body: JSON.stringify({status:'rejected',rejection_reason:reason})

  showToast('Advance rejected');
  loadHR();
}

async function runPayroll() {
  const month = document.getElementById('payroll-month')?.value;
  if (!month) { showToast('Select a month'); return; }
  if (!confirm('Run payroll for '+new Date(month+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'})+'? This will calculate salaries for all staff.')) return;
  showToast('Running payroll…');
  try {
    // Use the VW_HR_SELF utility if available
    if (typeof VW_HR_SELF !== 'undefined') {
      const results = await VW_HR_SELF.runMonthlyPayroll(month);
      showToast('✅ Payroll run complete — '+results.length+' staff processed');
    } else {
      showToast('Payroll engine not loaded — open Staff Portal first');
    }
    setTimeout(()=>loadHR(), 500);
  } catch(e) { showToast('Error: '+e.message); }
}

async function adjustLeaves(profileId) {
